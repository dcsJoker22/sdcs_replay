<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic DCS — Campaign Replay v1.56</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--dim:#8b949e;--blue:#58a6ff;--red:#f85149;
  --green:#3fb950;--yellow:#d29922;--accent:#1f6feb;--r:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#topbar{background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 14px;display:flex;align-items:center;gap:10px;height:44px;flex-shrink:0;z-index:1000}
#topbar h1{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.5px;white-space:nowrap}
#campaign-selector,#session-selector{background:var(--panel2);border:1px solid var(--border);
  color:var(--text);padding:3px 7px;border-radius:var(--r);font-size:12px;cursor:pointer}
#campaign-selector{max-width:220px}
#session-selector{max-width:260px}
#session-badge{background:var(--panel2);border:1px solid var(--border);padding:2px 7px;
  border-radius:var(--r);font-size:11px;color:var(--dim);white-space:nowrap}
.sel-label{font-size:10px;color:var(--dim);white-space:nowrap}
#wallclock{font-size:13px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;
  margin-left:auto;white-space:nowrap}

#main{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:#111;position:relative}

/* SIDEBAR — split into players (scroll) + kill feed (scroll) */
#sidebar{width:268px;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-sec{border-bottom:1px solid var(--border);padding:9px 11px;flex-shrink:0}
.sb-sec h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:7px}
.frow{display:flex;align-items:center;gap:7px;margin-bottom:3px;cursor:pointer;user-select:none;font-size:14px}
.frow input[type=checkbox]{accent-color:var(--blue);width:12px;height:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Players section — fixed height, scrollable */
#players-section{flex:0 0 auto;display:flex;flex-direction:column;min-height:0;max-height:45%;border-bottom:1px solid var(--border)}
#players-header{padding:7px 11px 5px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
#players-list{overflow-y:auto;padding:5px 9px 9px}
.pcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s,background .15s}
.pcard:hover{background:var(--panel2)}
.pcard.active{border-color:var(--blue);background:rgba(88,166,255,.05)}
.pc-hd{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.pc-cs{font-weight:700;font-size:13px;flex:1}
.pc-tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0}
.tag-blue{background:rgba(88,166,255,.2);color:var(--blue)}
.tag-red{background:rgba(248,81,73,.2);color:var(--red)}
.pc-st{color:var(--dim);font-size:11px;display:flex;gap:7px;flex-wrap:wrap}

/* Kill feed — flex:1 scrollable */
#killfeed-section{flex:1;display:flex;flex-direction:column;min-height:0}
#killfeed-header{padding:7px 11px 5px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border)}
#killfeed-list{flex:1;overflow-y:auto;padding:5px 9px 9px}
.kf-row{background:var(--bg);border:1px solid var(--border);border-radius:5px;
  padding:5px 8px;margin-bottom:4px;font-size:11px;transition:opacity 2s ease,box-shadow .3s}
.kf-row.pvp-blue{border-color:rgba(88,166,255,.5);background:rgba(88,166,255,.07);
  animation:pvp-flash-blue 1.4s ease-out}
.kf-row.pvp-red{border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.07);
  animation:pvp-flash-red 1.4s ease-out}
@keyframes pvp-flash-blue{
  0%,20%,40%,60%{box-shadow:0 0 10px 2px rgba(88,166,255,.7)}
  10%,30%,50%,70%{box-shadow:0 0 3px rgba(88,166,255,.1)}
  100%{box-shadow:none}
}
@keyframes pvp-flash-red{
  0%,20%,40%,60%{box-shadow:0 0 10px 2px rgba(248,81,73,.7)}
  10%,30%,50%,70%{box-shadow:0 0 3px rgba(248,81,73,.1)}
  100%{box-shadow:none}
}
.kf-killer{font-weight:700}
.kf-ac{color:var(--dim);font-size:10px}
.kf-victim{color:var(--text);font-style:italic}
.kf-weapon{color:var(--dim);font-size:10px}
.wlabel{pointer-events:none}
.wlabel-inner{display:flex;flex-direction:column;white-space:nowrap}
.wlabel-name{font-size:9px;font-weight:600;text-shadow:0 0 4px #000,0 0 4px #000}
.wlabel-telem{font-size:9px;color:var(--dim);text-shadow:0 0 3px #000}
.kf-time{color:var(--dim);font-size:10px;float:right}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

#timeline-bar{background:var(--panel);border-top:1px solid var(--border);
  padding:7px 13px 9px;flex-shrink:0}
#tl-controls{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.cbtn{background:var(--border);border:none;color:var(--text);padding:3px 8px;
  border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s;flex-shrink:0}
.cbtn:hover{background:#444c56}
.cbtn.active{background:var(--accent);color:#fff}
.spdbtn{font-size:11px;font-weight:700;min-width:36px;padding:3px 5px}
#tl-time{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap}
#scrubber-wrap{position:relative;height:34px}
#tl-bg{position:absolute;top:13px;left:0;right:0;height:8px;background:var(--border);border-radius:4px;pointer-events:none;z-index:1}
#tl-sessions{position:absolute;top:13px;left:0;right:0;height:8px;border-radius:4px;pointer-events:none;z-index:2;overflow:hidden}
#tl-events{position:absolute;top:0;left:0;right:0;height:34px;pointer-events:none;z-index:2}
.tpip{position:absolute;width:3px;border-radius:1px;top:5px;height:22px;transform:translateX(-50%);pointer-events:all;cursor:pointer;opacity:.85}
.sess-lbl{position:absolute;top:23px;font-size:9px;color:var(--dim);transform:translateX(-50%);white-space:nowrap;pointer-events:none}
#scrubber{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:transparent;
  outline:none;position:absolute;top:15px;cursor:pointer;z-index:3}
#scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--blue);border:2px solid var(--bg);box-shadow:0 0 5px rgba(88,166,255,.6);cursor:pointer}

/* UI SCALE CONTROL — sits in map top-left beside zoom buttons */
#ui-scale-ctrl{
  position:absolute;top:13px;left:54px;z-index:1000;
  background:#fff;border:2px solid rgba(0,0,0,.3);border-radius:4px;
  padding:4px 8px 5px;display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 1px 5px rgba(0,0,0,.4);
  /* prevent drag from propagating to map */
  pointer-events:all;
}
#ui-scale-ctrl label{
  font-size:9px;font-weight:700;color:#000;letter-spacing:.8px;text-transform:uppercase;
  white-space:nowrap;
}
#ui-scale-val{
  font-size:9px;font-weight:700;color:#000;min-width:28px;text-align:center;
}

#ui-scale-row{display:flex;align-items:center;gap:5px}
#ui-scale{
  -webkit-appearance:none;appearance:none;
  width:72px;height:3px;
  border-radius:2px;
  outline:none;cursor:pointer;
}
#ui-scale::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;border-radius:50%;
  background:#fff;border:1px solid #000;
  box-shadow:0 1px 1px rgba(0,0,0,.8);cursor:pointer;
  transition:transform .1s;
}
#ui-scale::-webkit-slider-thumb:hover{transform:scale(1.25)}
/* notch at default (1×) — rendered via JS background gradient */

#detail-panel{display:none;position:absolute;top:54px;right:276px;width:258px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:13px;z-index:2000;box-shadow:0 6px 24px rgba(0,0,0,.6)}
#detail-panel h2{font-size:14px;font-weight:700}
.dp-sub{color:var(--dim);font-size:11px;margin:3px 0 11px}
.dp-sec{margin-bottom:9px}
.dp-sec h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.kill-row{background:var(--bg);border-radius:4px;padding:4px 7px;margin-bottom:3px;font-size:11px}
.kill-row b{display:block;margin-bottom:1px}
.kill-row span{color:var(--dim)}
.fl-row{background:var(--bg);border-radius:4px;padding:4px 7px;margin-bottom:3px;
  font-size:11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fl-row:hover{background:var(--panel2)}
.fl-row span{color:var(--dim)}
#close-dp{float:right;background:none;border:none;color:var(--dim);font-size:17px;cursor:pointer;line-height:1;padding:0;margin-top:-2px}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;gap:13px}
#loading h2{color:var(--blue);font-size:18px}
#obj-counter{position:absolute;bottom:15px;left:15px;z-index:900;pointer-events:none;
  background:rgba(10,12,18,.82);border:1px solid rgba(255,255,255,.1);
  border-radius:7px;padding:11px 16px;min-width:264px;backdrop-filter:blur(4px)}
.obj-title{font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:3px}
.obj-title.blue{color:#58a6ff}.obj-title.red{color:#f85149}
.obj-bar-wrap{background:rgba(255,255,255,.08);border-radius:3px;height:8px;margin-bottom:8px;overflow:hidden}
.obj-bar{height:100%;border-radius:3px;transition:width .6s ease}
.obj-bar.blue{background:#4499ff}.obj-bar.red{background:#ff4433}
#loading p{color:var(--dim);font-size:12px}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.leaflet-tooltip{background:var(--panel)!important;border:1px solid var(--border)!important;
  color:var(--text)!important;font-size:11px!important;border-radius:4px!important;
  padding:3px 7px!important;box-shadow:0 2px 8px rgba(0,0,0,.4)!important}

/* PILOT LABELS — only show when airborne */
.plabel{background:none!important;border:none!important;box-shadow:none!important;padding:0!important;pointer-events:none}
.plabel-inner{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;padding-left:5px}
.plabel-name{font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:800;
  white-space:nowrap;letter-spacing:0.2px;
  text-shadow:0 0 4px #000,0 0 8px #000,-1px -1px 0 #000,1px 1px 0 #000,0 1px 0 #000,0 -1px 0 #000}
.plabel-name.blue{color:#58a6ff}
.plabel-name.red{color:#f85149}
.plabel-telem{font-family:'Courier New',monospace;font-size:12px;font-weight:700;color:#ffffff;
  white-space:nowrap;text-shadow:0 0 3px #000,1px 1px 0 #000}

/* BASE NAME LABELS */
.blabel{background:none!important;border:none!important;box-shadow:none!important;padding:0!important;pointer-events:none}
.blabel-name{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:700;
  white-space:nowrap;letter-spacing:0.2px;
  text-shadow:0 0 4px #000,0 0 8px #000,-1px -1px 0 #000,1px 1px 0 #000,0 1px 0 #000,0 -1px 0 #000}
.blabel-name.blue{color:#58a6ff}
.blabel-name.red{color:#f85149}
.blabel-name.neutral{color:#aaaaaa}
.glabel{background:none!important;border:none!important;box-shadow:none!important;padding:0!important;pointer-events:none}
.glabel-name{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:600;
  text-shadow:0 0 3px #000,0 0 3px #000,-1px -1px 2px #000,1px 1px 2px #000;white-space:nowrap}
.glabel-name.blue{color:#58a6ff}.glabel-name.red{color:#f85149}

/* EXPLOSION */
.expmark{background:none!important;border:none!important;box-shadow:none!important;pointer-events:none}
@keyframes er1{0%{transform:translate(-50%,-50%) scale(.1);opacity:1}60%{opacity:.8}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes er2{0%{transform:translate(-50%,-50%) scale(.1);opacity:.7}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}}
@keyframes ec{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}30%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(.6);opacity:0}}
@keyframes esk{0%{transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2) rotate(15deg);opacity:0}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><h2>Strategic DCS — Campaign Replay</h2><p id="load-msg">Initialising…</p></div>

<div id="topbar">
  <h1><img src="Logo_4.1.png" alt="" style="height:32px;width:32px;object-fit:contain;vertical-align:middle;margin-right:8px">SDCS REPLAY</h1>
  <span class="sel-label">CAMPAIGN</span>
  <select id="campaign-selector"><option>Loading…</option></select>
  <span class="sel-label">SESSION</span>
  <select id="session-selector" disabled><option>—</option></select>
  <span id="session-badge">—</span>
  <div id="wallclock">—</div>
</div>

<div id="main">
  <div id="map">
  <!-- UI scale slider — positioned beside Leaflet zoom buttons -->
  <div id="ui-scale-ctrl">
    <div id="ui-scale-row">
      <input type="range" id="ui-scale" min="0.5" max="2" step="0.01" value="1">
      <span id="ui-scale-val">1×</span>
    </div>
    <label style="color:#000">UI Scale</label>
  </div>
  <div id="obj-counter">
    <div class="obj-title blue" id="obj-blue-title">Blue team controls — / — Objectives</div>
    <div class="obj-bar-wrap"><div class="obj-bar blue" id="obj-blue-bar" style="width:0%"></div></div>
    <div class="obj-title red" id="obj-red-title">Red team controls — / — Objectives</div>
    <div class="obj-bar-wrap"><div class="obj-bar red" id="obj-red-bar" style="width:0%"></div></div>
  </div>
</div>
  <div id="sidebar">
    <div class="sb-sec">
      <h3>Display Layers</h3>
      <label class="frow"><input type="checkbox" id="f-player" checked><span class="dot" style="background:#58a6ff"></span>Player Aircraft</label>
      <label class="frow" style="padding-left:18px"><input type="checkbox" id="f-player-labels" checked><span class="dot" style="background:#58a6ff;opacity:.6"></span>Player Labels</label>
      <label class="frow"><input type="checkbox" id="f-ai" checked><span class="dot" style="background:#bc8cff"></span>AI Aircraft</label>
      <label class="frow" style="padding-left:18px"><input type="checkbox" id="f-ai-labels" checked><span class="dot" style="background:#bc8cff;opacity:.6"></span>AI Labels</label>
      <label class="frow"><input type="checkbox" id="f-ground" checked><span class="dot" style="background:#3fb950"></span>Ground Vehicles</label>
      <label class="frow" style="padding-left:18px"><input type="checkbox" id="f-ground-labels"><span class="dot" style="background:#3fb950;opacity:.6"></span>Ground Labels</label>
      <label class="frow"><input type="checkbox" id="f-trails" checked><span class="dot" style="background:#555"></span>Trails</label>
      <label class="frow"><input type="checkbox" id="f-kills" checked><span class="dot" style="background:#f85149"></span>Kill Events</label>
      <label class="frow"><input type="checkbox" id="f-bases" checked><span class="dot" style="background:#d29922"></span>Bases / FARPs</label>
      <label class="frow"><input type="checkbox" id="f-weapons" checked><span class="dot" style="background:#e0e060"></span>Weapons (Player)</label>
      <!-- FLOT disabled — code intact, re-enable by restoring this label and uncommenting updateFLOT call
      <label class="frow"><input type="checkbox" id="f-flot" checked><span class="dot" style="background:#aaa;border-radius:2px"></span>Front Line (FLOT)</label>
      -->
    </div>
    <!-- Players section -->
    <div id="players-section">
      <div id="players-header">Players</div>
      <div id="players-list"></div>
    </div>
    <!-- Kill Feed section -->
    <div id="killfeed-section">
      <div id="killfeed-header">Kill Feed</div>
      <div id="killfeed-list"><div style="color:var(--dim);font-size:11px;padding:4px 0">No kills yet</div></div>
    </div>
  </div>
</div>

<div id="timeline-bar">
  <div id="tl-controls">
    <button class="cbtn" id="btn-prev">⏮</button>
    <button class="cbtn" id="btn-play">▶</button>
    <button class="cbtn" id="btn-pause">⏸</button>
    <button class="cbtn" id="btn-next">⏭</button>
    <button class="cbtn spdbtn" data-spd="1">1×</button>
    <button class="cbtn spdbtn" data-spd="5">5×</button>
    <button class="cbtn spdbtn" data-spd="10">10×</button>
    <button class="cbtn spdbtn active" data-spd="30">30×</button>
    <button class="cbtn spdbtn" data-spd="100">100×</button>
    <button class="cbtn spdbtn" data-spd="300">300×</button>
    <span id="tl-time">0:00:00 / 0:00:00</span>
  </div>
  <div id="scrubber-wrap">
    <div id="tl-bg"></div>
    <div id="tl-sessions"></div>
    <div id="tl-events"></div>
    <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1">
  </div>
</div>

<div id="detail-panel">
  <button id="close-dp">×</button>
  <h2 id="dp-cs"></h2><div class="dp-sub" id="dp-sub"></div>
  <div class="dp-sec"><h4>Flights</h4><div id="dp-flights"></div></div>
  <div class="dp-sec"><h4>Kill Events</h4><div id="dp-kills"></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  CONFIG
//  Campaigns are loaded from campaigns.json at startup (managed by watch_acmi.py).
//  SDCS_API: set to your map API URL if you have one.
// ════════════════════════════════════════════════════════════════════
let CAMPAIGNS_DATA = null;   // populated by loadCampaignsJSON()
const SDCS_API = null;

// All bases/objectives drawn from CAMPAIGN_GEODATA (DB coords). Shelter3 = colour only.

      {id:10, name:'Khasab',               lat:26.169826, lon:56.240170},
      {id:11, name:'Lar',                  lat:27.674732, lon:54.383145},
      {id:13, name:'Qeshm Island',         lat:26.754669, lon:55.902384},
      {id:15, name:'Sirri Island',         lat:25.909603, lon:54.539254},
      {id:16, name:'Tunb Kochak',          lat:26.243322, lon:55.145568},
      {id:23, name:'Al-Bateen',            lat:24.428077, lon:54.458580},
      {id:24, name:'Kish Intl',            lat:26.528148, lon:53.981049},
      {id:25, name:'Al Ain Intl',          lat:24.261428, lon:55.609245},
      {id:26, name:'Lavan Island',         lat:26.811108, lon:53.353293},
      {id:27, name:'Jiroft',               lat:28.723517, lon:57.675095},
      {id:28, name:'Ras Al Khaimah Intl',  lat:25.613494, lon:55.938797},
      {id:29, name:'Liwa AFB',             lat:23.650775, lon:53.824429},
    ],
    190: [
      {id:12, name:'Anapa-Vityazevo', lat:45.004999, lon:37.343321},
      {id:16, name:'Maykop-Khanskaya', lat:44.681441, lon:40.030793},
      {id:18, name:'Sochi-Adler', lat:43.444500, lon:39.936706},
      {id:20, name:'Sukhumi-Babushara', lat:42.861280, lon:41.120683},
      {id:24, name:'Kobuleti', lat:41.930129, lon:41.859032},
      {id:25, name:'Kutaisi', lat:42.177850, lon:42.477044},
      {id:26, name:'Mineralnye Vody', lat:44.228123, lon:43.076812},
      {id:27, name:'Nalchik', lat:43.514288, lon:43.632140},
      {id:28, name:'Mozdok', lat:43.792035, lon:44.601546},

// DCS name → icon key
// Order matters — specific before generic. All lowercased.
function iconKey(name) {
  if (!name) return 'modernFW';
  const n = name.toLowerCase();

  // transport
  if (n.includes('an-30') || n.includes('an30'))    return 'transport';
  if (n.includes('kc-30') || n.includes('kc30'))    return 'transport';
  if (n.includes('c-130') || n.includes('c130'))    return 'transport';
  if (n.includes('il-76') || n.includes('il76'))    return 'transport';
  if (n.includes('kc-135') || n.includes('kc135') || n.includes('kc135stratotanker')) return 'transport';

  // awacs — E2-D / E2 A xxx (no hyphen between E and 2 in DCS)
  if (n.startsWith('e2') || n.includes('e-2c') || n.includes('e-2d')) return 'awacs';

  // attackRW
  if (n.includes('ka-50') || n.includes('ka50'))    return 'attackRW';
  if (n.includes('ah-64') || n.includes('ah64'))    return 'attackRW';
  if (n.includes('mi-24') || n.includes('mi24'))    return 'attackRW';
  if (n.includes('sa342') || n.includes('sa-342'))  return 'attackRW';
  if (n.includes('oh58d') || n.includes('oh-58'))   return 'attackRW';

  // CH47
  if (n.includes('ch-47') || n.includes('ch47'))    return 'CH47';

  // Mi8 — check before any generic mi- catch
  if (n.includes('mi-8')  || n.includes('mi8'))     return 'Mi8';

  // huey
  if (n.includes('uh-1')  || n.includes('uh1'))     return 'huey';

  // prop
  if (n.includes('tf-51') || n.includes('tf51'))    return 'prop';
  if (n.includes('p-51')  || n.includes('p51'))     return 'prop';

  // legacyFW — su-25 before su-27; mig-15/19/21 before mig-29
  if (n.includes('su-25') || n.includes('su25'))    return 'legacyFW';
  if (n.includes('mig-21')|| n.includes('mig21'))   return 'legacyFW';
  if (n.includes('mig-15')|| n.includes('mig15'))   return 'legacyFW';
  if (n.includes('mig-19')|| n.includes('mig19'))   return 'legacyFW';
  if (n.includes('f-4e')  || n === 'f-4')           return 'legacyFW';
  if (n.includes('f-5e')  || n.includes('f-5e-3'))  return 'legacyFW';
  if (n.includes('miragef1') || n.includes('mirage f1')) return 'legacyFW';
  if (n.includes('ajs37') || n.includes('ajs-37'))  return 'legacyFW';
  if (n.includes('c-101') || n.includes('c101'))    return 'legacyFW';
  if (n.includes('l-39')  || n.includes('l39'))     return 'legacyFW';
  if (n.includes('mb-339')|| n.includes('mb339'))   return 'legacyFW';
  if (n.includes('f-86')  || n.includes('f86'))     return 'legacyFW';
  if (n.includes('av8b')  || n.includes('av-8'))    return 'legacyFW';
  if (n.includes('a-10c') || n.includes('a-10'))    return 'legacyFW';
  if (n.includes('su-25t'))                         return 'legacyFW';

  // modernFW — f-15 before any f-5 risk (already caught above anyway)
  if (n.includes('f-15')  || n.includes('f15'))     return 'modernFW';
  if (n.includes('f-16')  || n.includes('f16'))     return 'modernFW';
  if (n.includes('fa-18') || n.includes('fa18')
   || n.includes('f/a-18')|| n.includes('hornet'))  return 'modernFW';
  if (n.includes('jf-17') || n.includes('jf17'))    return 'modernFW';
  if (n.includes('su-27') || n.includes('su27'))    return 'modernFW';
  if (n.includes('su-33') || n.includes('su33'))    return 'modernFW';
  if (n.includes('j-11')  || n.includes('j11'))     return 'modernFW';
  if (n.includes('mig-29')|| n.includes('mig29'))   return 'modernFW';
  if (n.includes('m-2000')|| n.includes('m2000'))   return 'modernFW';
  if (n.includes('f-14')  || n.includes('f14'))     return 'modernFW';

  return 'modernFW';
}

let UI_SCALE = 1.0;

// Ground vehicles always use a plain diamond — no taccom icons
function makeGroundDiamond(color, sz) {
  const h = sz / 2;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="filter:drop-shadow(0 0 1px #000) drop-shadow(0 1px 1px #000)">
    <polygon points="${h},2 ${sz-2},${h} ${h},${sz-2} 2,${h}"
      fill="${color}" stroke="${color}" stroke-width=".5" opacity=".85"/>
  </svg>`;
}


function makeACSVG(key, color, sz, hdg, selected, isHuman) {
  const body = AC_ICONS[key] || AC_ICONS['default-air'];
  const rot = hdg != null ? `rotate(${hdg},32,32)` : '';
  const sel = selected
    ? `<circle cx="32" cy="32" r="28" fill="none" stroke="#fff" stroke-width="2" opacity=".55"/>`
    : '';
  // Both player and AI icons get black outline; player outline is thicker
  const outlineW = isHuman ? '4' : '2.5';
  const outline = `<g transform="${rot}" style="color:#000" fill="#000" stroke="#000" stroke-width="${outlineW}" stroke-linejoin="round" stroke-linecap="round" opacity=".85">${body}</g>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 64 64"
    style="color:${color}">${outline}
    <g transform="${rot}" fill="${color}" stroke="${color}" stroke-width=".7" opacity=".93">${body}</g>${sel}</svg>`;
}

function leafletIcon(cat, name, coalition, hdg, sel, isHuman, forceGnd) {
  const blue = coalition === 'Friendlies';
  const color = blue ? '#58a6ff' : '#f85149';


  // forceGnd=true for SAM units that are ai_air category but render as ground diamonds
  if (cat === 'ground' || forceGnd) {
    const sz = Math.round(14 * UI_SCALE);
    const html = makeGroundDiamond(color, sz);
    return L.divIcon({ html, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
  }

  const key = iconKey(name);
  const sz = Math.round((isHuman ? 36 : 28) * UI_SCALE);
  const svg = makeACSVG(key, color, sz, hdg, sel, isHuman);
  return L.divIcon({ html:svg, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
}

// Binary search: find last track index where track[i].t <= t
function trackIdxAt(track, t, hint){
  let lo=0, hi=track.length-1;
  // Fast path: hint is still valid or one step ahead
  if(hint>=0 && hint<track.length){
    if(track[hint].t<=t && (hint===hi||track[hint+1].t>t)) return hint;
    if(hint<hi && track[hint+1].t<=t){
      // Try scanning forward a few steps before full binary search
      for(let i=hint+1;i<=Math.min(hint+8,hi);i++)
        if(track[i].t>t) return i-1;
    }
  }
  while(lo<hi){ const mid=(lo+hi+1)>>1; if(track[mid].t<=t) lo=mid; else hi=mid-1; }
  return lo;
}

function haverKm(lat1,lon1,lat2,lon2){
  const R=6371,p=Math.PI/180;
  const dLat=(lat2-lat1)*p, dLon=(lon2-lon1)*p;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${pad(m)}m`:`${m}m`;}
function pad(n){return String(n).padStart(2,'0');}

// Build the campaign dropdown from CAMPAIGNS_DATA.
// Wires the campaign→session cascade.
function populateSelector(){
  const campSel = document.getElementById('campaign-selector');
  const sessSel = document.getElementById('session-selector');
  const campaigns = CAMPAIGNS_DATA.campaigns || [];

  campSel.innerHTML = '';
  if(!campaigns.length){
    campSel.innerHTML = '<option>No campaigns</option>';
    return;
  }

  // Sort newest-first by campaign date (or last session date), preserve original index as value
  const indexedCamps = campaigns.map((camp, i) => ({camp, i}));
  indexedCamps.sort((a, b) => {
    const da = a.camp.date ? new Date(a.camp.date)
             : a.camp.sessions?.length ? new Date(a.camp.sessions[a.camp.sessions.length-1].date||0) : 0;
    const db = b.camp.date ? new Date(b.camp.date)
             : b.camp.sessions?.length ? new Date(b.camp.sessions[b.camp.sessions.length-1].date||0) : 0;
    return db - da;
  });

  indexedCamps.forEach(({camp, i}) => {
    const o = document.createElement('option');
    o.value = i;
    // Label: "YYYY/MM/DD – Campaign Name" if date available, else just name
    let campLabel = camp.name;
    if(camp.date){
      const d = new Date(camp.date);
      if(!isNaN(d)){
        const yr=d.getUTCFullYear(), mo=String(d.getUTCMonth()+1).padStart(2,'0'), dy=String(d.getUTCDate()).padStart(2,'0');
        campLabel = `${yr}/${mo}/${dy} – ${camp.name}`;
      }
    }
    o.textContent = campLabel;
    campSel.appendChild(o);
  });

  // When campaign changes, repopulate session dropdown and auto-load first session
  campSel.addEventListener('change', () => {
    populateSessionSelector(parseInt(campSel.value));
  });

  // Seed session dropdown with first (newest) campaign
  populateSessionSelector(parseInt(campSel.options[0].value));
}

// Build the session dropdown for campaign at index campIdx.
// Auto-loads the most recent session (last in chronological list).
function populateSessionSelector(campIdx){
  const sessSel = document.getElementById('session-selector');
  const camp = (CAMPAIGNS_DATA.campaigns || [])[campIdx];
  if(!camp){ sessSel.innerHTML = '<option>—</option>'; sessSel.disabled = true; return; }

  const sessions = camp.sessions || [];
  sessSel.innerHTML = '';
  sessSel.disabled = sessions.length === 0;

  if(!sessions.length){
    sessSel.innerHTML = '<option>No sessions</option>';
    return;
  }

  // Sort oldest-first for display, preserving original index for loading
  const indexed = sessions.map((sess, i) => ({sess, i}));
  indexed.sort((a, b) => {
    const da = a.sess.date ? new Date(a.sess.date) : 0;
    const db = b.sess.date ? new Date(b.sess.date) : 0;
    return da - db;  // ascending = oldest first
  });

  indexed.forEach(({sess, i}) => {
    const o = document.createElement('option');
    o.value = i;  // original index used by loadSession

    // Label: derive YYYY/MM/DD HH:MM from sess.date, fallback to sess.label or filename
    let label = sess.label || sess.file;
    if(sess.date){
      const d = new Date(sess.date);
      if(!isNaN(d)){
        const yr=d.getUTCFullYear(), mo=String(d.getUTCMonth()+1).padStart(2,'0');
        const dy=String(d.getUTCDate()).padStart(2,'0');
        const hr=String(d.getUTCHours()).padStart(2,'0'), mn=String(d.getUTCMinutes()).padStart(2,'0');
        label = `${yr}/${mo}/${dy} ${hr}:${mn}`;
      }
    }
    o.textContent = label;

    // Tooltip: alphabetical deduplicated player names
    if(sess.players && sess.players.length){
      const seen = new Set();
      const names = [];
      for(const p of sess.players){
        const base = p.replace(/\s*\(\d+\)$/,'').replace(/\s*-\s*interpolated\s*$/i,'').trim();
        if(base && !seen.has(base)){ seen.add(base); names.push(base); }
      }
      names.sort((a,b) => a.localeCompare(b));
      o.title = names.join(', ');
    }
    sessSel.appendChild(o);
  });

  // Default to most recent (last in oldest-first sorted list)
  const lastIdx = indexed.length - 1;
  sessSel.selectedIndex = lastIdx;

  // Remove previous listener cleanly by replacing the element clone
  const newSel = sessSel.cloneNode(true);
  sessSel.parentNode.replaceChild(newSel, sessSel);
  newSel.selectedIndex = lastIdx;
  function highlightSelected(){
    Array.from(newSel.options).forEach((o,i) => {
      o.style.fontWeight = i === newSel.selectedIndex ? '700' : '';
      o.style.color      = i === newSel.selectedIndex ? '#58a6ff' : '';
    });
  }
  newSel.addEventListener('change', () => {
    highlightSelected();
    loadSession(campIdx, parseInt(newSel.value));
  });
  highlightSelected();

  loadSession(campIdx, parseInt(newSel.options[lastIdx].value));
}

// Load the selected session only and render it.
async function loadSession(campIdx, sessIdx){
  const camp = (CAMPAIGNS_DATA.campaigns || [])[campIdx];
  if(!camp) return;
  const sess = (camp.sessions || [])[sessIdx];
  if(!sess) return;

  setLoad(`Loading ${sess.label||sess.file}…`);
  document.getElementById('loading').style.display = 'flex';
  clearAll();
  SESSIONS = []; currentTime = 0;

  try {
    // sess.file is a path relative to public/ e.g. data/2026-02-26 Germany/session_*.json
    const r = await fetch(sess.file.replace(/ /g, '%20'));
    if(!r.ok) throw new Error(`Could not load ${sess.file} (HTTP ${r.status})`);
    const raw = await r.json();
    const dur = raw.meta?.duration_seconds || 0;
    const s = timeShift(raw, 0);
    s._label  = sess.label || sess.file;
    s._offset = 0;
    s._dur    = dur;
    SESSIONS.push(s);
    campaignDur = dur;
  } catch(e){
    setLoad('Error: ' + e.message);
    console.error(e);
    return;
  }

  setLoad('Merging…');         _merged = mergeSessions(SESSIONS);
  // Set campaignId before buildShelterMap so it can match Shelter3s to DB locations
  _merged._campaignId = camp.campaign_id;
  setLoad('Base ownership…');  buildShelterMap(); buildGroundKillTimes();
  setLoad('Initialising…');    initUnits(_merged);
  setLoad('Weapon tracks…');   initWeapons(_merged);
  setLoad('Drawing bases…');   await initBases(_merged, camp.campaign_id);
  setLoad('Building UI…');     buildPlayerList(_merged);

  // Find earliest track point — skip dead startup zone
  let firstUnitT = 0;
  { let mn=Infinity;
    for(const track of Object.values(_merged.tracks))
      if(track.length && track[0].t < mn) mn = track[0].t;
    if(mn < Infinity && mn > 0) firstUnitT = mn;
  }
  const scrubEl = document.getElementById('scrubber');
  scrubEl.min   = firstUnitT;
  scrubEl.max   = campaignDur;
  currentTime   = firstUnitT;

  drawTimeline();
  flotLastT = -9999;
  document.getElementById('loading').style.display = 'none';

  // Badge: duration + kill count for this session
  const killsStr = sess.kill_count ? ` · ${sess.kill_count} kills` : '';
  document.getElementById('session-badge').textContent = `${fmtDur(campaignDur)}${killsStr}`;

  seekTo(firstUnitT);

  // Recentre map to the correct theatre for this campaign.
  // Primary: numeric campaign_id. Fallback: match camp.map name (case-insensitive).
  const MAP_NAMES = {
    'persian gulf': 189, 'persiangulf': 189, 'gulf': 189,
    'caucasus': 190, 'georgia': 190,
    'germany': 192, 'normandy2': 192,
    'syria': 185, 'sinai': 185,
    'nevada': 194, 'nttr': 194,
    'marianas': 195,
    'south atlantic': 196, 'falklands': 196,
  };
  let mcKey = camp.campaign_id;
  if(!MAP_CENTRES[mcKey]){
    const mapNameKey = (camp.map||'').toLowerCase().replace(/[^a-z]/g,'');
    mcKey = MAP_NAMES[mapNameKey] || MAP_NAMES[(camp.map||'').toLowerCase()];
  }
  const mc = MAP_CENTRES[mcKey];
  if(mc) map.setView([mc.lat, mc.lon], mc.zoom);
  else console.warn('No MAP_CENTRES entry for campaign_id', camp.campaign_id, 'map:', camp.map);
}

function timeShift(data,offset){
  if(offset===0) return JSON.parse(JSON.stringify(data));
  const d=JSON.parse(JSON.stringify(data));
  for(const tr of Object.values(d.tracks)) for(const p of tr) p.t+=offset;
  for(const e of d.events) e.t+=offset;
  for(const o of Object.values(d.objects)){o.first_seen+=offset;o.last_seen+=offset;}
  for(const p of Object.values(d.players)){
    for(const f of p.flights){f.start_t+=offset;f.end_t+=offset;}
    for(const k of p.kills) k.t+=offset;
  }
  return d;
}

function mergeSessions(sessions){
  const m={objects:{},tracks:{},events:[],statics:[],players:{},_dp:{}};
  const seenSt=new Set();
  for(const s of sessions){
    Object.assign(m.objects,s.objects);
    Object.assign(m.tracks,s.tracks);
    m.events.push(...s.events);
    for(const st of s.statics){if(!seenSt.has(st.name)){seenSt.add(st.name);m.statics.push(st);}}
    for(const [k,p] of Object.entries(s.players)){
      if(!m.players[k]) m.players[k]={callsign:p.callsign,flights:[],kills:[],deaths:0};
      m.players[k].flights.push(...p.flights);
      m.players[k].kills.push(...p.kills);
      m.players[k].deaths+=p.deaths;
    }
  }
  for(const [k,p] of Object.entries(m.players)){
    const base=k.replace(/\s*\(\d+\)$/,'').replace(/\s*-\s*interpolated\s*$/i,'').trim();
    if(!m._dp[base]) m._dp[base]={callsign:base,flights:[],kills:[],deaths:0,coalition:null};
    const dp=m._dp[base];
    dp.flights.push(...p.flights);dp.kills.push(...p.kills);dp.deaths+=p.deaths;
  }
  for(const dp of Object.values(m._dp)){
    dp.coalition=dp.flights.map(f=>f.coalition).filter(Boolean)[0]||'Unknown';
  }
  // Strip '- interpolated' suffix from pilot names on all objects
  for(const obj of Object.values(m.objects)){
    if(obj.pilot) obj.pilot=obj.pilot.replace(/\s*-\s*interpolated\s*$/i,'').trim();
  }
  return m;
}

//  SHELTER3 OWNERSHIP — 10nm (18.52km) radius
// ════════════════════════════════════════════════════════════════════
const NM10 = 18.52; // km

// buildShelterMap: builds _shelter3Map keyed by base/objective key.
// Shelter3 units in ACMI are matched to known locations (from CAMPAIGN_GEODATA)
// by proximity. They affect COLOUR only — not location or name.
function buildShelterMap(){
  _shelter3Map={};
  if(!_merged) return;
  const shelters=[];
  for(const [id,obj] of Object.entries(_merged.objects)){
    if(obj.name!=='Shelter3') continue;
    const track=_merged.tracks[id];
    if(!track||!track.length) continue;
    shelters.push({id,obj,pt:track[0],startT:track[0].t,endT:track[track.length-1].t});
  }
  if(!shelters.length) return;

  const campaignId = _merged?._campaignId;
  const geodataBases = campaignId ? (CAMPAIGN_GEODATA.bases[campaignId]||[]) : [];
  const geodataObjs  = campaignId ? (CAMPAIGN_GEODATA.objectives[campaignId]||[]) : [];

  function registerLocation(lat, lon, key, fallbackCoal){
    const nearby = shelters
      .filter(sh => haverKm(lat, lon, sh.pt.lat, sh.pt.lon) < NM10)
      .sort((a,b) => a.startT - b.startT);
    const initialCoal = nearby.length ? nearby[0].obj.coalition : (fallbackCoal||'Neutral');
    _shelter3Map[key] = { shelterHistory: nearby, initialCoal };
  }

  for(const b of geodataBases)
    registerLocation(b.lat, b.lon, 'airbase_'+b.name, 'Neutral');
  for(const o of geodataObjs){
    const key = o.code ? o.code+'_'+o.name : 'obj_'+o.name;
    registerLocation(o.lat, o.lon, key, 'Neutral');
  }
}

function buildGroundKillTimes(){
  // Pre-populate kill times and hide times at load so seeking works correctly.
  // groundKillTimes: kill events only — these still drive explosion animations.
  // unitHideTimes:   Visible=0 timestamp if present, otherwise falls back to kill time.
  //                  Used for fade/hide logic. Never triggers explosions.
  for(const k of Object.keys(groundKillTimes)) delete groundKillTimes[k];
  for(const k of Object.keys(baseKillTimes)) delete baseKillTimes[k];
  for(const k of Object.keys(unitHideTimes)) delete unitHideTimes[k];
  if(!_merged) return;

  // Pass 1: record Visible=0 times from object metadata for all ground/SAM units
  for(const [id, obj] of Object.entries(_merged.objects)){
    const vt = obj.visible_off_t;
    if(vt == null) continue;
    if(isGroundVehicle(obj)){
      unitHideTimes[id] = vt;
    }
  }

  // Pass 2: record kill event times (unchanged — still drive explosions)
  for(const ev of _merged.events){
    if(ev.type!=='kill') continue;
    if(!ev.victim_id) continue;
    const victimObj = _merged.objects[ev.victim_id];
    if(!victimObj) continue;
    if(isGroundVehicle(victimObj)){
      // groundKillTimes is kill-events only (explosion trigger)
      if(!(ev.victim_id in groundKillTimes)) groundKillTimes[ev.victim_id] = ev.t;
      // unitHideTimes falls back to kill time if no Visible=0 was recorded
      if(!(ev.victim_id in unitHideTimes)) unitHideTimes[ev.victim_id] = ev.t;
    }
    // Factories killed
    const vnm = victimObj.name || '';
    if(vnm === 'Factory3'){
      const bkey = `factory_${ev.victim_id}`;
      if(!(bkey in baseKillTimes)) baseKillTimes[bkey] = ev.t;
    }
    // FARPs killed
    if(vnm === 'Shelter3FARP'){
      const track = _merged.tracks[ev.victim_id];
      if(track && track.length){
        const pt = track[0];
        const gk = `${pt.lat.toFixed(3)},${pt.lon.toFixed(3)}`;
        const fkey = `farp_${gk}`;
        if(!(fkey in baseKillTimes)) baseKillTimes[fkey] = ev.t;
      }
    }
  }
}

function baseOwnerAt(key,t){
  const entry=_shelter3Map[key];
  if(!entry) return 'Neutral';
  const hist=entry.shelterHistory||[];
  if(!hist.length) return entry.initialCoal||'Neutral';
  // Walk history: each shelter is active from its startT until the next shelter appears (or end).
  // The owner at time t is the coalition of the last shelter whose startT <= t+30.
  let owner=entry.initialCoal||'Neutral';
  for(const sh of hist){
    if(t >= sh.startT - 30) owner=sh.obj.coalition;
    else break;
  }
  return owner;
}

    ...Object.values(baseLabels),...Object.values(weaponMarkers),...Object.values(weaponLabels),...killLayers,

  for(const segs of Object.values(unitTrails)) for(const poly of segs) try{map.removeLayer(poly)}catch(e){}
  for(const segs of Object.values(weaponTrails)) for(const poly of segs) try{map.removeLayer(poly)}catch(e){}
  for(const d of [unitMarkers,unitTrails,pilotLabels,groundLabels,baseMarkers,baseCircles,baseInnerCircles,baseLabels,weaponMarkers,weaponTrails,weaponLabels])
    Object.keys(d).forEach(k=>delete d[k]);

}

const STRUCT_NAMES = new Set([
  'FARPWatchtower','FARP Flag','FARP Tanker','Shelter3','Shelter3FARP',
  'Shelter3Construction','Shelter3Crate','Windsock','JTACTower','FARPAmmoStatic','FatCowFuelTruck',
  'COMP RELOAD','Factory3','FactoryBuild','FactoryBuild3',
]);

// Aircraft-type prefixes used in ACMI unit names — used to exclude real aircraft
// from the ai_air SAM detection rule (e.g. 'FA-18C', 'CH-47D', 'An-30M')
const AIRCRAFT_PREFIXES = new Set(['FA','CH','An','UH','AH','Mi','Ka','Su','MiG','Tu','IL','A','B']);
// Standalone SAM/radar units with no group prefix in their ACMI name
const SAM_STANDALONE = new Set(['55G6 EWR','Dog Ear radar','SA-2 Fan Song','Flat Face radar',
  'P-19 Flat Face B','Spoon Rest','Side Net']);
// AI aircraft whose ACMI names don't follow a clear prefix pattern — explicit allowlist
const AI_AIRCRAFT_NAMES = new Set(['E2-D','KC-135']);

// Auto-detect SAM/air-defence units without a fixed whitelist.
// Ground units are shown by blacklist (see isGroundVehicle).
// ai_air non-human: show if name has a group prefix (e.g. 'SA10-S-300PS 5P85C ln')
// that is NOT an aircraft type prefix, OR is a known standalone radar.
function isSAMUnit(obj){
  if(!obj.name) return false;
  if(obj.category!=='ai_air') return false;
  if(obj.is_human) return false;
  const nm = obj.name;
  if(nm.toLowerCase().includes('truck build')) return false;
  // Explicit AI aircraft allowlist — never treat as SAM
  if(AI_AIRCRAFT_NAMES.has(nm)) return false;
  if(SAM_STANDALONE.has(nm)) return true;
  const dashIdx = nm.indexOf('-');
  if(dashIdx < 1) return false;
  const prefix = nm.slice(0, dashIdx);
  if(AIRCRAFT_PREFIXES.has(prefix)) return false;
  if(/^[A-Z]-?$/.test(prefix)) return false;
  return true;
}

// Strip group prefix for display: 'BDREDMRSAM-SA-11 Buk LN 9A310M1' → 'SA-11 Buk LN 9A310M1'
function samDisplayName(nm){
  const dashIdx = nm.indexOf('-');
  if(dashIdx > 0 && !SAM_STANDALONE.has(nm)){
    const prefix = nm.slice(0, dashIdx);
    if(!AIRCRAFT_PREFIXES.has(prefix) && !/^[A-Z]-?$/.test(prefix))
      return nm.slice(dashIdx+1);
  }
  return nm;
}

// For ground vehicles: show all real vehicles (not structures), excluding 'Base' callsigns
function isGroundVehicle(obj){
  if(!obj.name) return false;
  // ai_air SAM components (prefixed group names like 'SA10-S-300PS 5P85C ln')
  if(isSAMUnit(obj)) return true;
  // Everything below: ground category only
  if(obj.category!=='ground') return false;
  const nm=obj.name;
  // Exclude known structures and logistics clutter
  if(STRUCT_NAMES.has(nm)) return false;
  // Exclude BD/SA10/SA11 prefixed ground spawn markers
  if(nm.startsWith('BD')||nm.startsWith('SA11-')||nm.startsWith('SA10-')) return false;
  return true;
}

// For aircraft: show all player_air and ai_air with a name and track.
// Excludes SAM components (handled by isSAMUnit/isGroundVehicle).
function isNamedAircraft(obj){
  if(!obj.name) return false;
  if(obj.category!=='player_air'&&obj.category!=='ai_air') return false;
  // SAM components filed as ai_air are handled as ground units
  if(isSAMUnit(obj)) return false;
  return true;
}

function initUnits(merged){
  for(const [id,track] of Object.entries(merged.tracks)){
    if(!track.length) continue;
    const obj=merged.objects[id];
    if(!obj) continue;
    const cat=obj.category;

    const isGnd=isGroundVehicle(obj);
    const isAir=isNamedAircraft(obj);
    if(!isGnd&&!isAir) continue;

    const pt0=track[0];
    // AI_AIRCRAFT_NAMES are never player-controlled regardless of parser output
    const isHuman=(obj.is_human||false) && !AI_AIRCRAFT_NAMES.has(obj.name);
    const blue=obj.coalition==='Friendlies';

    const marker=L.marker([pt0.lat,pt0.lon],{
      icon:leafletIcon(cat,obj.name,obj.coalition,pt0.hdg,false,isHuman,isGnd),
      zIndexOffset:isHuman?2000:(isAir?1000:0),
    });
    const dispNm=isGnd?isSAMUnit(obj)?samDisplayName(obj.name):obj.name:obj.name;
    const tip=isHuman?`<b>${obj.pilot||obj.name}</b><br>${obj.name}`
      :isGnd?dispNm:`${obj.name}${obj.pilot?' ['+obj.pilot+']':''}`;
    marker.bindTooltip(tip,{direction:'top',offset:[0,-6]});
    if(isHuman){
      marker.on('click',()=>{
        const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
        const p=merged._dp[base];if(p)openDetail(base,p);
      });
    }
    marker.addTo(map);marker._vis=false;marker.setOpacity(0);marker._idx=0;
    unitMarkers[id]=marker;

    // Ground unit name label
    if(isGnd){
      const gclr=blue?'blue':'red';
      const gFS=Math.round(11*UI_SCALE);
      const glblHtml=`<div class="glabel-name ${gclr}" style="font-size:${gFS}px">${isSAMUnit(obj)?samDisplayName(obj.name):obj.name}</div>`;
      const glblIcon=L.divIcon({html:glblHtml,className:'glabel',iconSize:[120,14],iconAnchor:[-9,7]});
      const glbl=L.marker([pt0.lat,pt0.lon],{icon:glblIcon,pane:'glabelPane',interactive:false});
      glbl._vis=false;  // not added to map until toggle enabled
      groundLabels[id]=glbl;
    }

    // Trail — aircraft only
    if(isAir){
      const trailColor=blue?'#1e6bb8':'#c42b20';
      const w=isHuman?3:2;
      // Segmented trail: N polylines each with increasing opacity toward most recent
      const TRAIL_SEGS=6;
      const trailSegs=[];
      for(let s=0;s<TRAIL_SEGS;s++){
        const op=0.12+0.55*(s/(TRAIL_SEGS-1)); // 0.12 (oldest) → 0.67 (newest)
        trailSegs.push(L.polyline([],{color:trailColor,weight:w,opacity:op,smoothFactor:1}).addTo(map));
      }
      unitTrails[id]=trailSegs;
    }

    // Pilot label — human aircraft ONLY; hidden when grounded
    if(isHuman&&isAir){
      const clr=blue?'blue':'red';
      const pFS=Math.round(16*UI_SCALE), tFS=Math.round(12*UI_SCALE);
      const lblHtml=`<div class="plabel-inner">
        <span class="plabel-name ${clr}" style="font-size:${pFS}px" id="ln-${id}"></span>
        <span class="plabel-telem" style="font-size:${tFS}px" id="lt-${id}"></span></div>`;
      const lblIcon=L.divIcon({html:lblHtml,className:'plabel',iconSize:[220,40],iconAnchor:[-20,34]});
      const lbl=L.marker([pt0.lat,pt0.lon],{icon:lblIcon,pane:'plabelPane',interactive:false});
      lbl.addTo(map);lbl._vis=false;lbl.setOpacity(0);
      // Cache DOM refs — avoids getElementById every frame
      lbl._nameEl=null; lbl._telemEl=null;  // populated on first render
      pilotLabels[id]=lbl;
    }

    // AI aircraft name label
    if(!isHuman&&isAir){
      const clr=blue?'blue':'red';
      const aFS=Math.round(12*UI_SCALE), atFS=Math.round(10*UI_SCALE);
      const lblHtml=`<div class="plabel-inner"><span class="plabel-name ${clr}" style="font-size:${aFS}px" id="ln-${id}">${obj.name}</span><span class="plabel-telem" style="font-size:${atFS}px" id="lt-${id}"></span></div>`;
      const lblIcon=L.divIcon({html:lblHtml,className:'plabel',iconSize:[220,40],iconAnchor:[-20,38]});
      const lbl=L.marker([pt0.lat,pt0.lon],{icon:lblIcon,pane:'aiPane',interactive:false});
      lbl.addTo(map);lbl._vis=false;lbl.setOpacity(0);
      lbl._nameEl=null; lbl._telemEl=null;
      pilotLabels[id]=lbl;
    }
  }
}

function isAirLaunchedWeapon(name){
  if(!name) return false;
  const u=name.toUpperCase();
  // Ground/naval munitions — skip these to avoid clutter
  if(u.startsWith('WEAPONS.SHELLS.') || u.startsWith('WEAPONS.BULLETS.') ||
     u.startsWith('WEAPONS.TORPEDOES.')) return false;
  // Air-launched: missiles (AIM, AGM, R-, Kh-), bombs (GBU, MK-, JDAM), rockets (S-8 etc.)
  return true;
}

function initWeapons(merged){
  for(const [id,track] of Object.entries(merged.tracks)){
    if(!track.length) continue;
    const obj=merged.objects[id];
    if(!obj||obj.category!=='player_weapon') continue;
    if(!isAirLaunchedWeapon(obj.name)) continue;

    const pt0=track[0];
    const blue=obj.coalition==='Friendlies';
    const color=blue?'#58a6ff':'#f85149';
    const clr=blue?'blue':'red';
    const label=(obj.name||'').replace(/^weapons\.\w+\./i,'').replace(/_/g,' ');

    const marker=L.circleMarker([pt0.lat,pt0.lon],{
      radius:Math.max(2,Math.round(3*UI_SCALE)),color:'#000',weight:1,fillColor:color,fillOpacity:0.9,pane:'wlabelPane',
    });
    marker.bindTooltip(`<b>${label}</b>${obj.pilot?' · '+obj.pilot:''}`,{direction:'top',offset:[0,-4]});
    marker.addTo(map);marker._vis=false;marker.setStyle({opacity:0,fillOpacity:0});marker._idx=0;
    weaponMarkers[id]=marker;

    const trailSegs=[];
    for(let s=0;s<TRAIL_SEGS_WPN;s++){
      const op=0.10+0.55*(s/(TRAIL_SEGS_WPN-1));
      trailSegs.push(L.polyline([],{color,weight:1.5,opacity:op,smoothFactor:1,pane:'wpnPane'}).addTo(map));
    }
    weaponTrails[id]=trailSegs;

    const wFS=Math.round(9*UI_SCALE);
    const lblHtml=`<div class="wlabel-inner"><span class="wlabel-name ${clr}" style="font-size:${wFS}px">${label}</span><span class="wlabel-telem" style="font-size:${wFS}px" id="wt-${id}"></span></div>`;
    const lbl=L.marker([pt0.lat,pt0.lon],{icon:L.divIcon({html:lblHtml,className:'wlabel',iconSize:[160,30],iconAnchor:[-6,24]}),pane:'wlabelPane',interactive:false});
    lbl.addTo(map);lbl._vis=false;lbl.setOpacity(0);
    weaponLabels[id]=lbl;
  }
}

function updateWeapon(id,track,t){
  const obj=_merged?.objects[id];if(!obj||obj.category!=='player_weapon') return;
  const mrk=weaponMarkers[id];
  const segs=weaponTrails[id];
  const lbl=weaponLabels[id];
  if(!mrk) return;

  if(!filters.weapons){
    mrk.setStyle({opacity:0,fillOpacity:0});mrk._vis=false;
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(segs) for(const p of segs) p.setLatLngs([]);
    return;
  }

  const first=track[0].t,last=track[track.length-1].t;
  const alive=(t>=first&&t<=last+2);
  if(!alive){
    if(mrk._vis){mrk.setStyle({opacity:0,fillOpacity:0});mrk._vis=false;}
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(segs) for(const p of segs) p.setLatLngs([]);
    return;
  }

  const idx=trackIdxAt(track,t,mrk._idx||0);
  mrk._idx=idx;
  const pt=track[idx];

  let dispLat=pt.lat,dispLon=pt.lon;
  if(idx<track.length-1){
    const ptN=track[idx+1];const seg=ptN.t-pt.t;
    if(seg>0&&seg<=3){
      const frac=Math.min((t-pt.t)/seg,1);
      dispLat=pt.lat+(ptN.lat-pt.lat)*frac;
      dispLon=pt.lon+(ptN.lon-pt.lon)*frac;
    }
  }

  mrk.setLatLng([dispLat,dispLon]);
  // Update radius each frame so scale slider takes effect immediately
  mrk.setRadius(Math.max(2,Math.round(3*UI_SCALE)));
  if(!mrk._vis){mrk.setStyle({opacity:1,fillOpacity:0.9});mrk._vis=true;}

  if(lbl){
    lbl.setLatLng([dispLat,dispLon]);
    if(!lbl._vis){lbl.setOpacity(1);lbl._vis=true;}
    const telemEl=document.getElementById(`wt-${id}`);
    if(telemEl&&idx>0){
      const prev=track[idx-1];const dt=pt.t-prev.t;
      if(dt>0&&dt<5){
        const dlat=(pt.lat-prev.lat)*111320;
        const dlon=(pt.lon-prev.lon)*111320*Math.cos(pt.lat*Math.PI/180);
        const mps=Math.sqrt(dlat*dlat+dlon*dlon)/dt;
        const mach=mps/340;
        if(mach>0.05){
          const altFt=Math.round((pt.alt||0)*3.28084);
          const altK=(altFt/1000).toFixed(1);
          telemEl.textContent=`${altK}k ft M${mach.toFixed(2)}`;
        }
      }
    }
  }

  if(filters.trails&&segs){
    const trailPts=track.filter(p=>p.t>=t-TRAIL_SECS_WPN&&p.t<=t);
    if(trailPts.length>=2){
      const segLen=Math.ceil(trailPts.length/TRAIL_SEGS_WPN);
      for(let s=0;s<TRAIL_SEGS_WPN;s++){
        const chunk=trailPts.slice(s*segLen,s*segLen+segLen+1);
        segs[s].setLatLngs(chunk.length>=2?chunk.map(p=>[p.lat,p.lon]):[]);
      }
    } else { for(const p of segs) p.setLatLngs([]); }
  } else if(segs){ for(const p of segs) p.setLatLngs([]); }
}


// ════════════════════════════════════════════════════════════════════
//  BASES & FARPS & FACTORIES
// ════════════════════════════════════════════════════════════════════
// initBases: draws bases/objectives from CAMPAIGN_GEODATA (DB coords, fixed locations).
// FARPs and Factories remain ACMI-driven. Shelter3 affects colour only (see updateBaseOwnership).
async function initBases(merged, campaignId){
  // Store campaignId on merged so buildShelterMap (called before this) can also use it
  merged._campaignId = campaignId;

  let bases=[];
  if(SDCS_API){
    try{
      const r=await fetch(SDCS_API);const d=await r.json();
      bases=d.map(b=>({
        name:b.name||b.id,code:b.code||'',lat:parseFloat(b.lat||b.latitude),
        lon:parseFloat(b.lon||b.longitude),coalition:b.coalition||'Neutral',
        type:b.type||'objective',isFarp:false,isFactory:false,key:b.code||b.id,
      }));
    }catch(e){console.warn('SDCS API unavailable');}
  }

  if(!bases.length && CAMPAIGN_GEODATA){
    // ── Airbases — directly from CAMPAIGN_GEODATA.bases (DB coords, fixed positions)
    for(const b of (CAMPAIGN_GEODATA.bases[campaignId]||[])){
      const key='airbase_'+b.name;
      const initialCoal = _shelter3Map[key]?.initialCoal || 'Neutral';
      bases.push({key, name:b.name, code:'', lat:b.lat, lon:b.lon,
        coalition:initialCoal, type:'airbase', isFarp:false, isFactory:false});
    }

    // ── Objectives — directly from CAMPAIGN_GEODATA.objectives (DB coords, fixed positions)
    // Skip objectives whose name duplicates a base — they display as bases already
    const baseNameSet = new Set((CAMPAIGN_GEODATA.bases[campaignId]||[]).map(b => b.name.toLowerCase()));
    for(const o of (CAMPAIGN_GEODATA.objectives[campaignId]||[])){
      if(baseNameSet.has(o.name.toLowerCase())) continue;
      const key = o.code ? o.code+'_'+o.name : 'obj_'+o.name;
      const initialCoal = _shelter3Map[key]?.initialCoal || 'Neutral';
      bases.push({key, name:o.name, code:o.code||'', lat:o.lat, lon:o.lon,
        coalition:initialCoal, type:'objective', isFarp:false, isFactory:false});
    }

    // ── FARPs — Shelter3FARP units from ACMI (location from track data)
    const seenFarp=new Set();
    for(const [id,obj] of Object.entries(merged.objects)){
      if(obj.name!=='Shelter3FARP') continue;
      const track=merged.tracks[id];if(!track||!track.length) continue;
      const pt=track[0];
      const gk=`${pt.lat.toFixed(3)},${pt.lon.toFixed(3)}`;
      if(seenFarp.has(gk)) continue; seenFarp.add(gk);
      let farpName='FARP';
      for(const st of merged.statics){
        if(!st.name||!st.name.match(/^FARP\s+[RB]\d+/i)) continue;
        if(haverKm(st.lat,st.lon,pt.lat,pt.lon)<3){farpName=st.name;break;}
      }
      const key='farp_'+gk;
      bases.push({key,name:farpName,code:'',lat:pt.lat,lon:pt.lon,
        coalition:obj.coalition,type:'farp',isFarp:true,isFactory:false,
        firstSeen:obj.first_seen||pt.t});
    }

    // ── Factories — Factory3 units from ACMI (location from track data)
    for(const [id,obj] of Object.entries(merged.objects)){
      if(obj.name !== 'Factory3') continue;
      const track=merged.tracks[id];if(!track||!track.length) continue;
      const pt=track[0];
      const key=`factory_${id}`;
      bases.push({key,name:'Factory',code:'',lat:pt.lat,lon:pt.lon,
        coalition:obj.coalition,type:'factory',isFarp:false,isFactory:true,
        firstSeen:obj.first_seen||pt.t});
    }
  }

  _baseList=bases.map(b=>({key:b.key,name:b.name,lat:b.lat,lon:b.lon,
    coalition:b.coalition,isFarp:b.isFarp,isFactory:b.isFactory||false,
    firstSeen:b.firstSeen||0}));

  for(const b of bases) drawBase(b);
}

function drawBase(b){
  if(!b.lat||!b.lon) return;
  const blue=b.coalition==='Friendlies'||b.coalition==='Blue';
  const red=b.coalition==='Hostiles'||b.coalition==='Red';
  const teamColor=blue?'#58a6ff':red?'#f85149':'#888888';
  const isFarp=b.isFarp||b.type==='farp';
  const isAB=b.type==='airbase';
  const isFactory=b.isFactory||b.type==='factory';

  // Icon
  let shp;
  if(isFarp){
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 11 11">
      <polygon points="5.5,0 11,5.5 5.5,11 0,5.5" fill="${teamColor}" opacity=".9"/>
      <polygon points="5.5,2.5 8.5,5.5 5.5,8.5 2.5,5.5" fill="${teamColor}" opacity=".35"/>
    </svg>`;
  } else if(isFactory){
    // Factory: gear-ish square with cross
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 11 11">
      <rect x="1" y="1" width="9" height="9" rx="1.5" fill="${teamColor}" opacity=".85"/>
      <line x1="5.5" y1="1" x2="5.5" y2="10" stroke="#000" stroke-width=".8" opacity=".5"/>
      <line x1="1" y1="5.5" x2="10" y2="5.5" stroke="#000" stroke-width=".8" opacity=".5"/>
      <rect x="3.5" y="3.5" width="4" height="4" rx=".5" fill="none" stroke="#000" stroke-width=".8" opacity=".4"/>
    </svg>`;
  } else if(isAB){
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
      <rect x="1" y="1" width="11" height="11" rx="2" fill="${teamColor}" opacity=".9"/>
      <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="#000" stroke-width=".8" opacity=".4"/>
      <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="#000" stroke-width=".8" opacity=".4"/>
    </svg>`;
  } else {
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">
      <polygon points="5,0 10,5 5,10 0,5" fill="${teamColor}" opacity=".85"/>
    </svg>`;
  }
  const sz=isAB?13:11;
  const icon=L.divIcon({html:shp,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  const tip=isFarp?`<b>FARP</b>${b.name&&b.name!=='FARP'?' · '+b.name:''}`
    :isFactory?`<b>Factory</b>${b.name!=='Factory'?' · '+b.name:''}`
    :`<b>${b.name}</b>${b.code?' ['+b.code+']':''}`;
  const mk=L.marker([b.lat,b.lon],{icon,zIndexOffset:-600});
  mk.bindTooltip(`${tip}<br>${blue?'🔵 Blue':'🔴 Red'} · ${b.type}`,{direction:'top',offset:[0,-5]});
  if(filters.bases) mk.addTo(map);
  baseMarkers[b.key]=mk;

  // Circle: factories use green fill, others use team colour
  const circFill=isFactory?'#44cc44':teamColor;
  const circFillOp=isFactory?0.06:0.05;
  const circR=18520; // 10nm for all: objectives, FARPs, and factories
  const circ=L.circle([b.lat,b.lon],{
  radius:circR,pane:'basePane',
  color:teamColor,weight:2,opacity:0.75,
  fillColor:circFill,fillOpacity:circFillOp*1.5,interactive:false,
  });
  if(filters.bases) circ.addTo(map);
  baseCircles[b.key]=circ;

  // Inner concentric ring — airbases only
  if(isAB){
    // Inner ring sits 2px gap inside outer stroke — approximate in metres
    const innerR = circR - 800; // ~800m = visual 2px gap at zoom 7
    const innerCirc = L.circle([b.lat,b.lon],{
      radius:innerR, pane:'basePane',
      color:teamColor, weight:1.5, opacity:0.50,
      fill:false, interactive:false,
    });
    if(filters.bases) innerCirc.addTo(map);
    baseInnerCircles[b.key]=innerCirc;
  }

  // Name label on map (bases & factories, not FARPs)
  if(!isFarp){
    const clr=blue?'blue':red?'red':'neutral';
    // Objectives: prepend code to label unless name already starts with it (e.g. 'FK34 Crossroads')
  const labelName=(!isFactory&&!isFarp&&b.code&&!b.name.startsWith(b.code))?`${b.code} ${b.name}`:b.name;
  const displayName=isFactory?`⚙ ${b.name}`:labelName;
    const lblHtml=isFactory
      ?`<div class="blabel-name ${clr}" style="font-size:12px;font-style:italic">${displayName}</div>`
      :`<div class="blabel-name ${clr}">${displayName}</div>`;
    const lbl=L.divIcon({html:lblHtml,className:'blabel',iconSize:[200,18],iconAnchor:[0,-sz/2-4]});
    const lblMk=L.marker([b.lat,b.lon],{icon:lbl,pane:'blabelPane',interactive:false});
    if(filters.bases) lblMk.addTo(map);
    baseLabels[b.key]=lblMk;
  }
}

function updateBaseOwnership(t){
  for(const b of _baseList){
    const circ = baseCircles[b.key];
    const mk   = baseMarkers[b.key];
    const lbl  = baseLabels[b.key];
    const innerCirc = baseInnerCircles[b.key];

    // ── FARPs and Factories: visibility/fade only, colour does not change ──
    if(b.isFarp || b.isFactory){
      if((b.isFarp || b.isFactory) && b.firstSeen > 0 && t < b.firstSeen){
        if(circ) circ.setStyle({opacity:0, fillOpacity:0});
        if(mk)   mk.setOpacity(0);
        if(lbl)  lbl.setOpacity(0);
        continue;
      }
      const killT = baseKillTimes[b.key];
      const op = killT == null ? 1
        : t >= killT + 60 ? 0
        : t >= killT ? Math.max(0, 1-(t-killT)/60)
        : 1;
      if(circ)  circ.setStyle({opacity: op*0.5, fillOpacity: op*(b.isFactory?0.06:0.05)});
      if(mk)    mk.setOpacity(op);
      if(lbl)   lbl.setOpacity(op);
      continue;
    }

    // ── Bases and objectives: colour driven by Shelter3 ownership ──
    const owner  = baseOwnerAt(b.key, t);
    const isBlue = owner === 'Friendlies';
    const isRed  = owner === 'Hostiles';
    const color  = isBlue ? '#58a6ff' : isRed ? '#f85149' : '#888888';

    // Update circle colour
    if(circ) circ.setStyle({color, fillColor:color});
    if(innerCirc) innerCirc.setStyle({color});

    // Redraw marker icon with new team colour
    if(mk){
      b.coalition = owner; // keep _baseList in sync for FLOT
      const isAB = b.type === 'airbase';
      let shp;
      if(isAB){
        shp=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
          <rect x="1" y="1" width="11" height="11" rx="2" fill="${color}" opacity=".9"/>
          <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="#000" stroke-width=".8" opacity=".4"/>
          <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="#000" stroke-width=".8" opacity=".4"/>
        </svg>`;
      } else {
        shp=`<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">
          <polygon points="5,0 10,5 5,10 0,5" fill="${color}" opacity=".85"/>
        </svg>`;
      }
      const sz = isAB ? 13 : 11;
      mk.setIcon(L.divIcon({html:shp,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}));
    }
    // Update label text colour
    if(lbl){
      const nameEl = lbl.getElement()?.querySelector('.blabel-name');
      if(nameEl) nameEl.className = `blabel-name ${isBlue?'blue':isRed?'red':'neutral'}`;
    }
  }
  // ── Objective counter ────────────────────────────────────────────
  let blueCount=0, redCount=0, total=0;
  for(const b of _baseList){
    if(b.isFarp||b.isFactory) continue;
    if(SCORE_EXCLUDE_KEYS.has(b.key)) continue;
    total++;
    const owner = b.key ? baseOwnerAt(b.key, t) : b.coalition;
    if(owner==='Friendlies') blueCount++;
    else if(owner==='Hostiles') redCount++;
  }
  const blueTitle=document.getElementById('obj-blue-title');
  const redTitle =document.getElementById('obj-red-title');
  const blueBar  =document.getElementById('obj-blue-bar');
  const redBar   =document.getElementById('obj-red-bar');
  if(blueTitle&&total>0){
    blueTitle.textContent=`Blue team controls ${blueCount} / ${total} Objectives`;
    redTitle.textContent =`Red team controls ${redCount} / ${total} Objectives`;
    blueBar.style.width=`${(blueCount/total)*100}%`;
    redBar.style.width =`${(redCount/total)*100}%`;
  }
}

function buildPlayerList(merged){
  const cont=document.getElementById('players-list');cont.innerHTML='';

  // Only show players with real aircraft flights present in this session's objects
  const sessionObjIds=new Set(Object.keys(merged.objects));
  const entries=Object.entries(merged._dp)
    .map(([cs,p])=>({cs,p,real:p.flights.filter(f=>f.aircraft&&!isWpn(f.aircraft)&&sessionObjIds.has(f.obj_id))}))
    .filter(({real})=>real.length>0)
    .sort((a,b)=>a.cs.localeCompare(b.cs));

  for(const {cs,p,real} of entries){
    const blue=p.coalition==='Friendlies';
    playerColors[cs]=blue?'#58a6ff':'#f85149';
    const card=document.createElement('div');
    card.className='pcard';card.dataset.cs=cs;
    card.innerHTML=`<div class="pc-hd"><span class="pc-cs">${cs}</span>
      <span class="pc-tag ${blue?'tag-blue':'tag-red'}">${blue?'BLUE':'RED'}</span></div>
      <div class="pc-st"><span>✈ ${real.length} flight${real.length!==1?'s':''}</span>
      <span>💥 ${p.kills.length} kill${p.kills.length!==1?'s':''}</span>
      <span>☠ ${p.deaths}</span></div>`;
    card.addEventListener('click',()=>openDetail(cs,p));
    cont.appendChild(card);
  }
}
function isWpn(n){
  if(!n) return false;
  const u = n.toUpperCase();
  // parse_acmi prefixes weapon objects with 'weapons.' or 'weapons.shells.' etc.
  if(u.startsWith('WEAPONS.') || u.startsWith('WEAPONS/')) return true;
  return ['AGM','AIM','MIM','AAM','HARM','HELLFIRE','HYDRA','ZUNI','MK-','GBU-','JDAM',
          'R-','S-5','S-8','S-13','S-24','KH-','X-','C-701','CM-','SD-10'].some(w=>u.includes(w));
}

// Add a kill to the feed
function addKillFeedEntry(ev, t){
  const killerCs=(ev.killer||'').trim();
  if(!killerCs||/^\d+/.test(killerCs)) return; // non-player killer

  const killerCoal=playerColors[killerCs]? (playerColors[killerCs]==='#58a6ff'?'Friendlies':'Hostiles') : null;
  const victimIsPlayer=ev.victim_category==='player_air'&&ev.victim_pilot;
  const victimCs=(ev.victim_pilot||'').replace(/\s*\(\d+\)$/,'').trim();
  const pvp=victimIsPlayer&&victimCs&&!/^\d+/.test(victimCs);

  const victimName=victimIsPlayer?victimCs:(ev.victim_name||'Unknown');
  const weaponName=(ev.weapon||'?').replace(/_/g,' ');

  const list=document.getElementById('killfeed-list');
  // Remove placeholder
  const ph=list.querySelector('div[style]');if(ph)ph.remove();

  const el=document.createElement('div');
  el.className='kf-row';
  if(pvp){
    const blue=killerCoal==='Friendlies';
    el.classList.add(blue?'pvp-blue':'pvp-red');
  }
  const killerColor=playerColors[killerCs]||'#aaa';
  const timeStr=fmtT(t);
  // Find what aircraft the killer was in at kill time
  let killerAc = '';
  if(_merged && _merged._dp && _merged._dp[killerCs]){
    const flights = _merged._dp[killerCs].flights || [];
    const ev_t = ev.t;
    const flight = flights.find(f => ev_t >= f.start_t && ev_t <= (f.end_t + 60) && f.aircraft && !isWpn(f.aircraft));
    if(flight) killerAc = flight.aircraft.replace(/_/g,' ');
  }
  const killerLine = killerAc
    ? `<span class="kf-killer" style="color:${killerColor}">${killerCs}</span> <span class="kf-ac">(${killerAc})</span>`
    : `<span class="kf-killer" style="color:${killerColor}">${killerCs}</span>`;
  el.innerHTML=`<span class="kf-time">${timeStr}</span>
    ${killerLine} killed<br>
    <span class="kf-victim">${victimName}</span><br>
    <span class="kf-weapon">${weaponName}</span>`;

  // Insert at top
  list.insertBefore(el,list.firstChild);

  // Fade out after 10 minutes of game time
  killFeedEntries.push({t:ev.t,el});
}

function updateKillFeed(t){
  const FADE_SECS=600; // 10 min
  for(const entry of killFeedEntries){
    const age=t-entry.t;
    if(age>FADE_SECS){
      entry.el.style.opacity='0';
      entry.el.style.pointerEvents='none';
    } else if(age<0){
      entry.el.style.opacity='0';
      entry.el.style.pointerEvents='none';
    } else {
      entry.el.style.opacity='1';
      entry.el.style.pointerEvents='';
    }
  }
}

function openDetail(cs,player){
  selectedPlayer=cs;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('active',c.dataset.cs===cs));
  document.getElementById('dp-cs').textContent=cs;
  const blue=player.coalition==='Friendlies';
  document.getElementById('dp-sub').textContent=
    `${blue?'🔵 Blue':'🔴 Red'} · ${player.flights.filter(f=>!isWpn(f.aircraft)).length} flights · ${player.kills.length} kills · ${player.deaths} deaths`;
  const fEl=document.getElementById('dp-flights');fEl.innerHTML='';
  for(const fl of player.flights.filter(f=>!isWpn(f.aircraft))){
    const d=document.createElement('div');d.className='fl-row';
    d.innerHTML=`<b>${fl.aircraft}</b><span>${fl.duration_min}min · ${fmtT(fl.start_t)}</span>`;
    d.addEventListener('click',()=>{seekTo(fl.start_t);focusObj(fl.obj_id);});
    fEl.appendChild(d);
  }
  const kEl=document.getElementById('dp-kills');kEl.innerHTML='';
  if(!player.kills.length){kEl.innerHTML='<div style="color:var(--dim);font-size:11px">No kills</div>';}
  for(const k of player.kills){
    const d=document.createElement('div');d.className='kill-row';
    d.innerHTML=`<b>${k.victim||'?'}</b><span>${k.weapon||'?'} · ${fmtT(k.t)}</span>`;
    if(k.lat&&k.lon){d.style.cursor='pointer';d.addEventListener('click',()=>{seekTo(k.t);map.setView([k.lat,k.lon],12);});}
    kEl.appendChild(d);
  }
  document.getElementById('detail-panel').style.display='block';
  highlightTrails();
}
document.getElementById('close-dp').addEventListener('click',()=>{
  document.getElementById('detail-panel').style.display='none';
  selectedPlayer=null;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));
  highlightTrails();
});
function highlightTrails(){
  if(!_merged) return;
  for(const [id,segs] of Object.entries(unitTrails)){
    const obj=_merged.objects[id];if(!obj) continue;
    const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
    const sel=base===selectedPlayer;
    const blue=obj.coalition==='Friendlies';
    const color=blue?'#1e6bb8':'#c42b20';
    segs.forEach((p,i)=>{
      const op=sel?0.95:(0.12+0.55*(i/(segs.length-1)));
      const w=sel?3.5:(obj.is_human?3:2);
      const c=sel?'#fff':color;
      p.setStyle({color:c,weight:w,opacity:op});
    });
    if(sel) segs[segs.length-1].bringToFront();
  }
}
function focusObj(id){
  const track=_merged?.tracks[id];if(!track) return;
  const pt=track.reduce((b,p)=>Math.abs(p.t-currentTime)<Math.abs(b.t-currentTime)?p:b);
  map.setView([pt.lat,pt.lon],11);
}

function drawTimeline(){
  const sDiv=document.getElementById('tl-sessions');sDiv.innerHTML='';
  const BCOLS=['#1f3a5c','#2a1f3f','#1f3a2f','#3a2a1f'];
  SESSIONS.forEach((s,i)=>{
    const x=(s._offset/campaignDur)*100,w=(s._dur/campaignDur)*100;
    const b=document.createElement('div');
    b.style.cssText=`position:absolute;left:${x}%;width:${w}%;height:100%;background:${BCOLS[i%4]}`;
    sDiv.appendChild(b);
    const l=document.createElement('div');l.className='sess-lbl';
    l.style.left=`${x+w/2}%`;l.textContent=s._label;sDiv.appendChild(l);
  });
  const eDiv=document.getElementById('tl-events');eDiv.innerHTML='';
  for(const ev of SESSIONS.flatMap(s=>s.events)){
    if(ev.type!=='kill'&&ev.type!=='crashed'&&ev.type!=='pilot dead') continue;
    let pipColor='#888888';
    const killerCs=(ev.killer||'').trim();
    const vcs=(ev.victim_pilot||'').replace(/\s*\(\d+\)$/,'').trim();
    if(killerCs&&!/^\d+/.test(killerCs)&&playerColors[killerCs]) pipColor=playerColors[killerCs];
    else if(vcs&&playerColors[vcs]) pipColor=playerColors[vcs];
    const pip=document.createElement('div');pip.className='tpip';
    pip.style.left=`${(ev.t/campaignDur)*100}%`;pip.style.background=pipColor;
    pip.title=`${ev.victim_name||vcs||'?'} · ${fmtT(ev.t)}`;
    pip.addEventListener('click',()=>seekTo(ev.t));
    eDiv.appendChild(pip);
  }
}
