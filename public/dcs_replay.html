<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic DCS — Campaign Replay</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --blue: #58a6ff;
    --red: #f85149;
    --green: #3fb950;
    --yellow: #d29922;
    --accent: #1f6feb;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  #topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }

  #topbar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  #session-info {
    color: var(--text-dim);
    font-size: 12px;
    flex: 1;
  }

  #current-time-display {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
    min-width: 80px;
    text-align: right;
  }

  /* ── Main Layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    background: #111;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-section {
    border-bottom: 1px solid var(--border);
    padding: 12px;
  }

  .sidebar-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* ── Filters ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    cursor: pointer;
    user-select: none;
  }

  .filter-row input[type=checkbox] {
    accent-color: var(--blue);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Players List ── */
  #players-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .player-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .player-card:hover, .player-card.active {
    border-color: var(--blue);
  }

  .player-card .callsign {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .player-card .stats {
    color: var(--text-dim);
    font-size: 11px;
    display: flex;
    gap: 10px;
  }

  .player-card .coalition-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    float: right;
  }

  .tag-blue { background: rgba(88,166,255,0.2); color: var(--blue); }
  .tag-red  { background: rgba(248,81,73,0.2);  color: var(--red);  }

  /* ── Bottom Timeline ── */
  #timeline-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px 12px;
    flex-shrink: 0;
    user-select: none;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .ctrl-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }

  .ctrl-btn:hover { background: #444c56; }
  .ctrl-btn.active { background: var(--accent); color: #fff; }

  #speed-display {
    color: var(--text-dim);
    font-size: 12px;
    min-width: 32px;
  }

  #time-label {
    color: var(--text-dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    flex: 1;
    text-align: right;
  }

  /* ── Scrubber ── */
  #scrubber-container {
    position: relative;
    height: 32px;
  }

  #scrubber {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    position: absolute;
    top: 14px;
    cursor: pointer;
    z-index: 2;
  }

  #scrubber::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--blue);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 4px rgba(88,166,255,0.5);
  }

  /* Kill event markers on timeline */
  #event-markers {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 32px;
    pointer-events: none;
    z-index: 1;
  }

  .event-pip {
    position: absolute;
    width: 3px;
    height: 12px;
    top: 8px;
    border-radius: 2px;
    transform: translateX(-50%);
    pointer-events: all;
    cursor: pointer;
    z-index: 3;
  }

  /* ── Detail Panel (click on player) ── */
  #detail-panel {
    display: none;
    position: absolute;
    top: 60px;
    right: 292px;
    width: 260px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    z-index: 2000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  #detail-panel h2 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  #detail-panel .detail-sub {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 12px;
  }

  #detail-panel .detail-section {
    margin-bottom: 10px;
  }

  #detail-panel .detail-section h4 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .kill-entry {
    background: var(--bg);
    border-radius: 4px;
    padding: 6px 8px;
    margin-bottom: 4px;
    font-size: 11px;
  }

  .kill-entry .victim { font-weight: 600; }
  .kill-entry .kill-meta { color: var(--text-dim); }

  .flight-entry {
    background: var(--bg);
    border-radius: 4px;
    padding: 5px 8px;
    margin-bottom: 3px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
  }

  #close-detail {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }

  /* ── Kill flash animation ── */
  @keyframes killFlash {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    50%  { opacity: 0.9; transform: translate(-50%,-50%) scale(2.5); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(3.5); }
  }

  .kill-flash {
    animation: killFlash 1s ease-out forwards;
  }

  /* ── Tooltip ── */
  .leaflet-tooltip {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    font-size: 11px !important;
    border-radius: 4px !important;
    padding: 3px 7px !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
  }

  #loading h2 { color: var(--blue); font-size: 20px; }
  #loading p  { color: var(--text-dim); }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <h2>Strategic DCS Replay</h2>
  <p id="loading-msg">Loading session data…</p>
</div>

<!-- Top Bar -->
<div id="topbar">
  <h1>🎯 SDCS CAMPAIGN REPLAY</h1>
  <div id="session-info">Session loading…</div>
  <div id="current-time-display">00:00</div>
</div>

<!-- Main -->
<div id="main">
  <div id="map"></div>

  <div id="sidebar">
    <!-- Filters -->
    <div class="sidebar-section">
      <h3>Display Layers</h3>
      <label class="filter-row">
        <input type="checkbox" id="filter-player-air" checked>
        <span class="dot" style="background:#58a6ff"></span> Player Aircraft
      </label>
      <label class="filter-row">
        <input type="checkbox" id="filter-ai-air">
        <span class="dot" style="background:#8957e5"></span> AI Aircraft
      </label>
      <label class="filter-row">
        <input type="checkbox" id="filter-ground" checked>
        <span class="dot" style="background:#3fb950"></span> Ground Units
      </label>
      <label class="filter-row">
        <input type="checkbox" id="filter-trails" checked>
        <span class="dot" style="background:#888"></span> Flight Trails
      </label>
      <label class="filter-row">
        <input type="checkbox" id="filter-kills" checked>
        <span class="dot" style="background:#f85149"></span> Kill Events
      </label>
    </div>

    <!-- Players -->
    <div class="sidebar-section" style="padding-bottom:4px">
      <h3>Players</h3>
    </div>
    <div id="players-list"></div>
  </div>
</div>

<!-- Timeline -->
<div id="timeline-bar">
  <div id="controls">
    <button class="ctrl-btn" id="btn-prev">⏮</button>
    <button class="ctrl-btn" id="btn-play">▶</button>
    <button class="ctrl-btn" id="btn-pause">⏸</button>
    <button class="ctrl-btn" id="btn-next">⏭</button>
    <button class="ctrl-btn" id="btn-speed" title="Click to cycle speed">60×</button>
    <span id="speed-display">60×</span>
    <span id="time-label">0:00:00 / 0:00:00</span>
  </div>
  <div id="scrubber-container">
    <canvas id="event-markers"></canvas>
    <input type="range" id="scrubber" min="0" max="100" value="0" step="0.01">
  </div>
</div>

<!-- Player Detail Panel -->
<div id="detail-panel">
  <button id="close-detail">×</button>
  <h2 id="detail-callsign"></h2>
  <div class="detail-sub" id="detail-sub"></div>
  <div class="detail-section" id="detail-flights-section">
    <h4>Flights</h4>
    <div id="detail-flights"></div>
  </div>
  <div class="detail-section" id="detail-kills-section">
    <h4>Kill Events</h4>
    <div id="detail-kills"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG — point DATA_URL at your parsed JSON
// ═══════════════════════════════════════════════════════════════════
const DATA_URL = 'session1.json';

// ═══════════════════════════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [51.68, 10.51],
  zoom: 7,
  zoomControl: true,
  attributionControl: false,
});

// Satellite base layer (matches DCS terrain)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 17,
  attribution: ''
}).addTo(map);

// Subtle labels overlay
L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}.png', {
  maxZoom: 17,
  opacity: 0.25,
}).addTo(map);

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let DATA = null;
let currentTime = 0;
let maxTime = 0;
let playing = false;
let playSpeed = 60;
let lastRafTime = null;
let animFrame = null;
let selectedPlayer = null;

// Leaflet layers per object
const objectMarkers = {};      // objId -> L.Marker
const objectTrails  = {};      // objId -> L.Polyline
const killMarkers   = [];      // array of L.CircleMarker

// Track indices for efficient time lookup
const trackIndex = {};         // objId -> current position index

// Filters
let filters = {
  playerAir: true,
  aiAir: false,
  ground: true,
  trails: true,
  kills: true,
};

const SPEEDS = [1, 5, 15, 60, 120, 300];
let speedIdx = 3; // default 60×

// ═══════════════════════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════════════════════
function makeIcon(category, coalition, heading, isSelected) {
  const isBlue = coalition === 'Friendlies';
  const color  = isBlue ? '#58a6ff' : '#f85149';
  const size   = category === 'player_air' ? 18 : 12;
  const sel    = isSelected ? `stroke="#fff" stroke-width="1.5"` : '';
  const rot    = heading != null ? `transform="rotate(${heading},8,8)"` : '';

  let shape;
  if (category === 'player_air' || category === 'ai_air') {
    // Aircraft: arrow/chevron pointing up, rotated by heading
    shape = `<polygon points="8,1 14,15 8,11 2,15" fill="${color}" ${sel} ${rot}/>`;
  } else {
    // Ground unit: diamond
    shape = `<polygon points="8,1 15,8 8,15 1,8" fill="${color}" ${sel} opacity="0.85"/>`;
  }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">${shape}</svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });
}

// ═══════════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════════
async function loadData() {
  setLoading('Loading session data…');
  const resp = await fetch(DATA_URL);
  DATA = await resp.json();

  maxTime = DATA.meta.duration_seconds;
  document.getElementById('scrubber').max = maxTime;

  // Session info
  const refDate = new Date(DATA.meta.reference_time);
  document.getElementById('session-info').textContent =
    `${refDate.toUTCString().slice(0,16)} · ${DATA.meta.duration_hours}h · ${DATA.meta.player_count} players · ${DATA.meta.kill_count} kills`;

  setLoading('Building player list…');
  buildPlayerList();

  setLoading('Drawing event markers…');
  drawTimelineEvents();

  setLoading('Initializing units…');
  initUnits();

  document.getElementById('loading').style.display = 'none';
  seekTo(0);
}

// ═══════════════════════════════════════════════════════════════════
// PLAYER SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function buildPlayerList() {
  const container = document.getElementById('players-list');
  const players = DATA.players;

  // Deduplicate: group by base callsign
  const deduped = {};
  for (const [key, p] of Object.entries(players)) {
    const base = key.replace(/\s*\(\d+\)$/, '').trim();
    if (!deduped[base]) deduped[base] = { callsign: base, flights: [], kills: [], deaths: 0 };
    deduped[base].flights.push(...p.flights);
    deduped[base].kills.push(...p.kills);
    deduped[base].deaths += p.deaths;
  }

  DATA._deduped_players = deduped;

  for (const [callsign, p] of Object.entries(deduped)) {
    // Determine coalition from flights
    const coalitions = [...new Set(p.flights.map(f => f.coalition).filter(Boolean))];
    const coalition = coalitions[0] || 'Unknown';
    const isBlue = coalition === 'Friendlies';
    const tagClass = isBlue ? 'tag-blue' : 'tag-red';
    const tagLabel = isBlue ? 'BLUE' : 'RED';

    const card = document.createElement('div');
    card.className = 'player-card';
    card.dataset.callsign = callsign;
    card.innerHTML = `
      <div class="callsign">
        ${callsign}
        <span class="coalition-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="stats">
        <span>✈ ${p.flights.length} flights</span>
        <span>💥 ${p.kills.length} kills</span>
        <span>☠ ${p.deaths} deaths</span>
      </div>
    `;
    card.addEventListener('click', () => openPlayerDetail(callsign, p, coalition));
    container.appendChild(card);
  }
}

// ═══════════════════════════════════════════════════════════════════
// PLAYER DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════
function openPlayerDetail(callsign, player, coalition) {
  selectedPlayer = callsign;
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.player-card[data-callsign="${callsign}"]`);
  if (card) card.classList.add('active');

  document.getElementById('detail-callsign').textContent = callsign;
  document.getElementById('detail-sub').textContent =
    `${coalition === 'Friendlies' ? '🔵 BLUE' : '🔴 RED'} · ${player.flights.length} flights · ${player.kills.length} kills`;

  // Flights
  const flightsEl = document.getElementById('detail-flights');
  flightsEl.innerHTML = '';
  for (const fl of player.flights) {
    if (!fl.aircraft || fl.aircraft.includes('AGM') || fl.aircraft.includes('AIM') || fl.aircraft.includes('MIM')) continue;
    const d = document.createElement('div');
    d.className = 'flight-entry';
    d.innerHTML = `<span>${fl.aircraft}</span><span style="color:var(--text-dim)">${fl.duration_min}min</span>`;
    d.style.cursor = 'pointer';
    d.addEventListener('click', () => {
      seekTo(fl.start_t);
      focusOnObject(fl.obj_id);
    });
    flightsEl.appendChild(d);
  }

  // Kills
  const killsEl = document.getElementById('detail-kills');
  killsEl.innerHTML = '';
  if (player.kills.length === 0) {
    killsEl.innerHTML = '<div style="color:var(--text-dim);font-size:11px">No kills this session</div>';
  } else {
    for (const k of player.kills) {
      const d = document.createElement('div');
      d.className = 'kill-entry';
      d.innerHTML = `
        <div class="victim">${k.victim || '?'}</div>
        <div class="kill-meta">${k.weapon || '?'} · ${fmtTime(k.t)}</div>
      `;
      if (k.lat && k.lon) {
        d.style.cursor = 'pointer';
        d.addEventListener('click', () => {
          seekTo(k.t);
          map.setView([k.lat, k.lon], 11);
        });
      }
      killsEl.appendChild(d);
    }
  }

  document.getElementById('detail-panel').style.display = 'block';

  // Highlight this player's trails
  updateTrailHighlight();
}

function updateTrailHighlight() {
  for (const [objId, polyline] of Object.entries(objectTrails)) {
    const obj = DATA.objects[objId];
    if (!obj) continue;
    const pilotClean = obj.pilot ? obj.pilot.replace(/\s*\(\d+\)$/, '').trim() : null;
    if (pilotClean === selectedPlayer) {
      polyline.setStyle({ color: '#fff', weight: 2, opacity: 0.9 });
      polyline.bringToFront();
    } else {
      const isBlue = obj.coalition === 'Friendlies';
      polyline.setStyle({ color: isBlue ? '#2d6bb0' : '#a83228', weight: 1, opacity: 0.4 });
    }
  }
}

document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail-panel').style.display = 'none';
  selectedPlayer = null;
  document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
  updateTrailHighlight();
});

function focusOnObject(objId) {
  const track = DATA.tracks[objId];
  if (!track || track.length === 0) return;
  // Find track point closest to current time
  const pt = track.reduce((best, p) => Math.abs(p.t - currentTime) < Math.abs(best.t - currentTime) ? p : best);
  map.setView([pt.lat, pt.lon], 11);
}

// ═══════════════════════════════════════════════════════════════════
// TIMELINE EVENT MARKERS (kill pips on scrubber)
// ═══════════════════════════════════════════════════════════════════
function drawTimelineEvents() {
  const canvas = document.getElementById('event-markers');
  const container = document.getElementById('scrubber-container');
  canvas.width = container.offsetWidth;
  canvas.height = 32;
  const ctx = canvas.getContext('2d');

  for (const ev of DATA.events) {
    const pct = ev.t / maxTime;
    const x = pct * canvas.width;
    const isPlayer = ev.victim_category === 'player_air';
    ctx.fillStyle = isPlayer ? '#f85149' : '#d29922';
    ctx.fillRect(x - 1, 8, 3, 14);
  }
}

// ═══════════════════════════════════════════════════════════════════
// UNIT INITIALIZATION
// ═══════════════════════════════════════════════════════════════════
function initUnits() {
  for (const [objId, track] of Object.entries(DATA.tracks)) {
    if (!track.length) continue;
    const obj = DATA.objects[objId];
    if (!obj) continue;

    const cat = obj.category;
    if (!['player_air', 'ai_air', 'ground'].includes(cat)) continue;

    trackIndex[objId] = 0;

    // Create marker (hidden initially)
    const marker = L.marker([track[0].lat, track[0].lon], {
      icon: makeIcon(cat, obj.coalition, track[0].hdg, false),
      zIndexOffset: cat === 'player_air' ? 1000 : 0,
    });

    const label = obj.is_human
      ? `<b>${obj.pilot || obj.name}</b> · ${obj.name}`
      : `${obj.name} · ${obj.coalition}`;
    marker.bindTooltip(label, { permanent: false, direction: 'top', offset: [0, -8] });

    if (obj.is_human) {
      marker.on('click', () => {
        const baseCallsign = (obj.pilot || '').replace(/\s*\(\d+\)$/, '').trim();
        const p = DATA._deduped_players[baseCallsign];
        if (p) openPlayerDetail(baseCallsign, p, obj.coalition);
      });
    }

    marker.addTo(map);
    objectMarkers[objId] = marker;
    marker._visible = false;
    marker.setOpacity(0);

    // Trail (polyline, starts empty)
    const isBlue = obj.coalition === 'Friendlies';
    const trailColor = isBlue ? '#2d6bb0' : '#a83228';
    const polyline = L.polyline([], {
      color: trailColor,
      weight: 1,
      opacity: 0.4,
    }).addTo(map);
    objectTrails[objId] = polyline;
  }
}

// ═══════════════════════════════════════════════════════════════════
// SEEK — jump to time T
// ═══════════════════════════════════════════════════════════════════
function seekTo(t) {
  currentTime = Math.max(0, Math.min(t, maxTime));
  document.getElementById('scrubber').value = currentTime;
  updateDisplay();
}

// ═══════════════════════════════════════════════════════════════════
// UPDATE DISPLAY — render all units at currentTime
// ═══════════════════════════════════════════════════════════════════
const TRAIL_DURATION = 300; // seconds of trail to show behind each unit

function updateDisplay() {
  const t = currentTime;

  // Update time labels
  document.getElementById('current-time-display').textContent = fmtTime(t);
  document.getElementById('time-label').textContent = `${fmtTime(t)} / ${fmtTime(maxTime)}`;

  for (const [objId, track] of Object.entries(DATA.tracks)) {
    const obj = DATA.objects[objId];
    if (!obj) continue;
    const cat = obj.category;
    const marker = objectMarkers[objId];
    const trail  = objectTrails[objId];
    if (!marker) continue;

    // Check filter visibility
    const visible = shouldShow(cat, obj);
    if (!visible) {
      if (marker._visible) { marker.setOpacity(0); marker._visible = false; }
      if (trail) trail.setLatLngs([]);
      continue;
    }

    // Find track points bracketing current time
    const first = track[0].t;
    const last  = track[track.length - 1].t;

    if (t < first || t > last + 30) {
      // Not active at this time
      if (marker._visible) { marker.setOpacity(0); marker._visible = false; }
      if (trail && filters.trails) trail.setLatLngs([]);
      continue;
    }

    // Find closest point (binary search would be faster but arrays are small)
    let idx = trackIndex[objId] || 0;
    // Clamp
    if (track[idx].t > t) idx = 0; // rewound
    while (idx < track.length - 1 && track[idx + 1].t <= t) idx++;
    trackIndex[objId] = idx;

    const pt = track[idx];

    // Update marker
    marker.setLatLng([pt.lat, pt.lon]);
    const isSelected = obj.is_human && (obj.pilot || '').replace(/\s*\(\d+\)$/, '').trim() === selectedPlayer;
    marker.setIcon(makeIcon(cat, obj.coalition, pt.hdg, isSelected));
    if (!marker._visible) { marker.setOpacity(1); marker._visible = true; }

    // Trail: last N seconds of points
    if (filters.trails) {
      const trailStart = t - TRAIL_DURATION;
      const trailPts = track.filter(p => p.t >= trailStart && p.t <= t).map(p => [p.lat, p.lon]);
      trail.setLatLngs(trailPts);
    } else {
      trail.setLatLngs([]);
    }
  }

  // Kill event markers
  updateKillMarkers(t);
}

function shouldShow(cat, obj) {
  if (cat === 'player_air') return filters.playerAir;
  if (cat === 'ai_air')     return filters.aiAir;
  if (cat === 'ground')     return filters.ground;
  return false;
}

// ═══════════════════════════════════════════════════════════════════
// KILL MARKERS
// ═══════════════════════════════════════════════════════════════════
const shownKills = new Set();

function updateKillMarkers(t) {
  if (!filters.kills) return;

  for (const ev of DATA.events) {
    if (ev.type !== 'kill' && ev.type !== 'crashed') continue;
    if (!ev.lat || !ev.lon) continue;
    if (ev.t > t || ev.t < t - 15) continue; // show for 15s
    if (shownKills.has(ev.t + '_' + ev.victim_id)) continue;

    shownKills.add(ev.t + '_' + ev.victim_id);

    const isPlayer = ev.victim_category === 'player_air' && ev.victim_pilot;
    const color = isPlayer ? '#f85149' : '#d29922';

    const circle = L.circleMarker([ev.lat, ev.lon], {
      radius: isPlayer ? 14 : 8,
      color: color,
      fillColor: color,
      fillOpacity: 0.3,
      weight: 2,
    }).addTo(map);

    const label = isPlayer
      ? `💥 ${ev.victim_pilot} (${ev.victim_name}) killed by ${ev.killer || 'unknown'} with ${ev.weapon || '?'}`
      : `💥 ${ev.victim_name} destroyed`;
    circle.bindTooltip(label, { sticky: true });

    killMarkers.push(circle);

    // Fade out after 15s real time
    setTimeout(() => {
      map.removeLayer(circle);
      shownKills.delete(ev.t + '_' + ev.victim_id);
    }, 15000 / playSpeed);
  }
}

// ═══════════════════════════════════════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════════════════════════════════════
function tick(rafTime) {
  if (!playing) return;
  if (lastRafTime !== null) {
    const dt = (rafTime - lastRafTime) / 1000; // seconds
    currentTime += dt * playSpeed;
    if (currentTime >= maxTime) {
      currentTime = maxTime;
      playing = false;
      updatePlayBtn();
    }
    document.getElementById('scrubber').value = currentTime;
    updateDisplay();
  }
  lastRafTime = rafTime;
  if (playing) animFrame = requestAnimationFrame(tick);
}

function startPlay() {
  if (currentTime >= maxTime) currentTime = 0;
  playing = true;
  lastRafTime = null;
  updatePlayBtn();
  animFrame = requestAnimationFrame(tick);
}

function pausePlay() {
  playing = false;
  lastRafTime = null;
  updatePlayBtn();
  if (animFrame) cancelAnimationFrame(animFrame);
}

function updatePlayBtn() {
  document.getElementById('btn-play').classList.toggle('active', playing);
}

// ═══════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click', () => { if (!playing) startPlay(); });
document.getElementById('btn-pause').addEventListener('click', pausePlay);
document.getElementById('btn-prev').addEventListener('click', () => { pausePlay(); seekTo(0); });
document.getElementById('btn-next').addEventListener('click', () => { pausePlay(); seekTo(maxTime); });

document.getElementById('btn-speed').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  playSpeed = SPEEDS[speedIdx];
  document.getElementById('btn-speed').textContent = playSpeed + '×';
  document.getElementById('speed-display').textContent = playSpeed + '×';
});

document.getElementById('scrubber').addEventListener('input', (e) => {
  pausePlay();
  seekTo(parseFloat(e.target.value));
});

// Filters
document.getElementById('filter-player-air').addEventListener('change', e => { filters.playerAir = e.target.checked; updateDisplay(); });
document.getElementById('filter-ai-air').addEventListener('change',     e => { filters.aiAir     = e.target.checked; updateDisplay(); });
document.getElementById('filter-ground').addEventListener('change',     e => { filters.ground    = e.target.checked; updateDisplay(); });
document.getElementById('filter-trails').addEventListener('change',     e => { filters.trails    = e.target.checked; updateDisplay(); });
document.getElementById('filter-kills').addEventListener('change',      e => { filters.kills     = e.target.checked; });

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); playing ? pausePlay() : startPlay(); }
  if (e.code === 'ArrowRight') seekTo(currentTime + 60);
  if (e.code === 'ArrowLeft')  seekTo(currentTime - 60);
  if (e.code === 'ArrowUp')    seekTo(currentTime + 300);
  if (e.code === 'ArrowDown')  seekTo(currentTime - 300);
});

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
loadData().catch(err => {
  document.getElementById('loading-msg').textContent = 'Error: ' + err.message;
  console.error(err);
});
</script>
</body>
</html>
