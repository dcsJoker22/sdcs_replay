// ════════════════════════════════════════════════════════════════════
const TRAIL_SECS=240;
const shownKillFeed=new Set();

function updateDisplay(){
  const t=currentTime;
  let wc=fmtT(t);
  if(SESSIONS.length){
    const s=SESSIONS.slice().reverse().find(s=>t>=s._offset)||SESSIONS[0];
    if(s?.meta?.reference_time){
      const ms=new Date(s.meta.reference_time).getTime()+(t-s._offset)*1000;
      wc=new Date(ms).toUTCString().slice(5,22)+' Z';
    }
  }
  document.getElementById('wallclock').textContent=wc;
  document.getElementById('tl-time').textContent=`${fmtT(t)} / ${fmtDur(campaignDur)}`;
  document.getElementById('scrubber').value=t;

  for(const s of SESSIONS)
    for(const [id,track] of Object.entries(s.tracks))
      updateUnit(id,track,t);

  updateKills(t);
  updateKillFeedEvents(t);
  updateKillFeed(t);
  updateBaseOwnership(t);
  // FLOT disabled — if(filters.flot) updateFLOT(t);
}

function updateUnit(id,track,t){
  const obj=_merged?.objects[id];if(!obj) return;
  const cat=obj.category;
  const isGnd=isGroundVehicle(obj);
  const isAir=isNamedAircraft(obj);
  if(!isGnd&&!isAir) return;

  const mrk=unitMarkers[id];
  const poly=unitTrails[id];
  const lbl=pilotLabels[id];
  if(!mrk) return;

  const showByFilter=(isAir&&cat==='player_air'&&filters.playerAir)
    ||(isAir&&cat==='ai_air'&&filters.aiAir)
    ||(isGnd&&filters.ground);

  if(!showByFilter){
    if(mrk._vis){mrk.setOpacity(0);mrk._vis=false;}
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(poly) for(const p of poly) p.setLatLngs([]);
    const _gl1=groundLabels[id]; if(_gl1&&_gl1._vis){map.removeLayer(_gl1);_gl1._vis=false;}
    return;
  }
  const first=track[0].t, last=track[track.length-1].t;
  // Alive logic:
  // - Ground units: show from first_seen indefinitely unless killed (groundKillTimes handles that).
  //   ACMI stops broadcasting static units that haven't moved, so track[-1].t is unreliable
  //   as an end signal — a parked tank looks identical to a removed one in the data.
  //   Silent removal without a kill event cannot be detected from ACMI alone.
  // - Air units: disappear 30s after last track point (landed or despawned).
  const alive = isGnd ? t >= first : (t >= first && t <= last + 30);
  // Ground kill fade-out: 60s fade starting at kill time
  const killT = isGnd ? groundKillTimes[id] : null;
  if(killT != null){
    const elapsed = t - killT;
    if(elapsed >= 60){
      // Fully dead — always hide, regardless of current _vis state
      mrk.setOpacity(0); mrk._vis=false;
      const _glk=groundLabels[id]; if(_glk&&_glk._vis){map.removeLayer(_glk);_glk._vis=false;}
      return;  // must return — falling through would call setOpacity(1)
    } else if(elapsed > 0){
      // Fading — reduce opacity then fall through to update position
      const op = Math.max(0, 1 - elapsed/60);
      mrk.setOpacity(op);
      mrk._vis=true;
    }
  }
  if(!alive){
    if(mrk._vis){mrk.setOpacity(0);mrk._vis=false;}
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(poly) for(const p of poly) p.setLatLngs([]);
    const _gl2=groundLabels[id]; if(_gl2&&_gl2._vis){map.removeLayer(_gl2);_gl2._vis=false;}
    return;
  }
  let idx=mrk._idx||0;
  if(track[idx]&&track[idx].t>t) idx=0;
  while(idx<track.length-1&&track[idx+1].t<=t) idx++;
  mrk._idx=idx;
  const pt=track[idx];

  // Interpolate position between this sample and next for smooth movement
  let dispLat=pt.lat, dispLon=pt.lon, dispHdg=pt.hdg;
  if(!isGnd && idx<track.length-1){
    const ptN=track[idx+1];
    const seg=ptN.t-pt.t;
    if(seg>0 && seg<=15){ // only interpolate within expected sample gaps
      const frac=Math.min((t-pt.t)/seg,1);
      dispLat=pt.lat+(ptN.lat-pt.lat)*frac;
      dispLon=pt.lon+(ptN.lon-pt.lon)*frac;
      // Heading: interpolate angle correctly (shortest arc)
      if(pt.hdg!=null&&ptN.hdg!=null){
        let dh=ptN.hdg-pt.hdg;
        if(dh>180)dh-=360; if(dh<-180)dh+=360;
        dispHdg=pt.hdg+dh*frac;
      }
    }
  }

  mrk.setLatLng([dispLat,dispLon]);
  const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
  mrk.setIcon(leafletIcon(cat,obj.name,obj.coalition,isGnd?null:dispHdg,base===selectedPlayer,obj.is_human,isGnd));
  if(!mrk._vis){mrk.setOpacity(1);mrk._vis=true;}

  if(lbl&&isAir&&obj.is_human){
    // FARP FIX: hide pilot label when grounded (alt stable / very low above terrain)
    // Use track alt delta: if alt didn't change >5m in 20s, consider grounded
    const isGrounded=idx>0&&Math.abs(track[Math.max(0,idx-3)].alt-pt.alt)<5&&pt.alt<400;
    if(isGrounded){
      if(lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    } else {
      lbl.setLatLng([dispLat,dispLon]);
      if(!lbl._vis){lbl.setOpacity(1);lbl._vis=true;}
      const nameEl=document.getElementById(`ln-${id}`);
      const telemEl=document.getElementById(`lt-${id}`);
      if(nameEl){
        const cs=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
        nameEl.textContent=`${cs} (${obj.name||''})`;
      }
      if(telemEl){
        const altFt=Math.round((pt.alt||0)*3.28084);
        const altK=(altFt/1000).toFixed(1);
        let machStr='';
        if(idx>0){
          const prev=track[idx-1];const dt=pt.t-prev.t;
          if(dt>0&&dt<20){
            const dlat=(pt.lat-prev.lat)*111320;
            const dlon=(pt.lon-prev.lon)*111320*Math.cos(pt.lat*Math.PI/180);
            const mps=Math.sqrt(dlat*dlat+dlon*dlon)/dt;
            const mach=mps/340;
            if(mach>0.02) machStr=` M${mach.toFixed(2)}`;
          }
        }
        telemEl.textContent=`${altK}k ft${machStr}`;
      }
    }
  }

  // AI aircraft label — same position/show logic as player, no grounded suppression
  if(lbl&&isAir&&!obj.is_human){
    lbl.setLatLng([dispLat,dispLon]);
    if(!lbl._vis){lbl.setOpacity(1);lbl._vis=true;}
  }

  // Ground label — show/hide/move alongside unit marker
  if(isGnd){
    const glbl=groundLabels[id];
    if(glbl){
      const showLbl=filters.groundLabels&&mrk._vis;
      if(showLbl && !glbl._vis){
        glbl.setLatLng([pt.lat,pt.lon]);
        glbl.addTo(map);
        glbl._vis=true;
      } else if(!showLbl && glbl._vis){
        map.removeLayer(glbl);
        glbl._vis=false;
      } else if(showLbl){
        glbl.setLatLng([pt.lat,pt.lon]);
      }
    }
  }

  if(isAir&&filters.trails&&poly){
    const trailPts=track.filter(p=>p.t>=t-TRAIL_SECS&&p.t<=t);
    const TRAIL_SEGS=poly.length;
    if(trailPts.length>=2&&TRAIL_SEGS>0){
      const segLen=Math.ceil(trailPts.length/TRAIL_SEGS);
      for(let s=0;s<TRAIL_SEGS;s++){
        const start=s*segLen;
        // Overlap segments by 1 point so there are no gaps
        const chunk=trailPts.slice(start,start+segLen+1);
        poly[s].setLatLngs(chunk.length>=2?chunk.map(p=>[p.lat,p.lon]):[]);
      }
    } else {
      for(const p of poly) p.setLatLngs([]);
    }
  } else if(poly){ for(const p of poly) p.setLatLngs([]); }
}

// ════════════════════════════════════════════════════════════════════
//  EXPLOSIONS
// ════════════════════════════════════════════════════════════════════
function spawnExp(lat,lon,isPlayer){
  const sz=isPlayer?58:34,dur=isPlayer?1800:1200;
  const fc=isPlayer?'#ff4422':'#ffaa22';
  const ring=isPlayer?'#ff8844':'#ffcc44';
  const smoke=isPlayer?'#886655':'#998866';
  const h=sz/2;
  const sparks=[0,45,90,135,180,225,270,315].map(a=>{
    const r=h*.55,r2=h*.82;
    const x1=(Math.cos(a*Math.PI/180)*r).toFixed(1),y1=(Math.sin(a*Math.PI/180)*r).toFixed(1);
    const x2=(Math.cos(a*Math.PI/180)*r2).toFixed(1),y2=(Math.sin(a*Math.PI/180)*r2).toFixed(1);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${ring}" stroke-width="${isPlayer?2.5:1.5}" stroke-linecap="round"/>`;
  }).join('');
  const html=`<div style="position:relative;width:${sz}px;height:${sz}px;pointer-events:none">
    <div style="position:absolute;left:50%;top:50%;width:${sz*.9}px;height:${sz*.9}px;border-radius:50%;border:${isPlayer?4:3}px solid ${smoke};animation:er2 ${dur}ms ease-out forwards"></div>
    <div style="position:absolute;left:50%;top:50%;width:${sz*.75}px;height:${sz*.75}px;border-radius:50%;border:${isPlayer?5:3}px solid ${ring};background:radial-gradient(circle,${fc}cc 0%,${fc}55 50%,transparent 75%);animation:er1 ${dur*.8}ms ease-out forwards"></div>
    <div style="position:absolute;left:50%;top:50%;width:${sz*.4}px;height:${sz*.4}px;border-radius:50%;background:radial-gradient(circle,#ffffcc 0%,#ffdd44 40%,${fc} 80%);animation:ec ${dur*.7}ms ease-out forwards;box-shadow:0 0 ${isPlayer?18:10}px #ffaa33"></div>
    <svg style="position:absolute;left:50%;top:50%;overflow:visible;animation:esk ${dur*.9}ms ease-out forwards" width="${sz}" height="${sz}" viewBox="-${h} -${h} ${sz} ${sz}">${sparks}</svg>
  </div>`;
  const icon=L.divIcon({html,className:'expmark',iconSize:[sz,sz],iconAnchor:[h,h]});
  const m=L.marker([lat,lon],{icon,zIndexOffset:5000,interactive:false}).addTo(map);
  killLayers.push(m);
  setTimeout(()=>{try{map.removeLayer(m)}catch(e){}},dur+100);
}

function updateKills(t){
  if(!filters.kills) return;
  for(const ev of SESSIONS.flatMap(s=>s.events)){
    if(ev.type!=='kill'&&ev.type!=='crashed') continue;
    if(!ev.lat||!ev.lon) continue;
    const age=t-ev.t;if(age<0||age>25) continue;
    const key=`${ev.t}_${ev.victim_id}`;
    if(shownKills.has(key)) continue;
    shownKills.add(key);
    const isPlayer=ev.victim_category==='player_air'&&ev.victim_pilot;
    spawnExp(ev.lat,ev.lon,isPlayer);
    const color=isPlayer?'#f85149':'#d29922';
    const dot=L.circleMarker([ev.lat,ev.lon],{radius:3,color,fillColor:color,fillOpacity:.8,weight:1}).addTo(map);
    dot.bindTooltip(`💥 ${ev.victim_name||ev.victim_pilot||'?'}`,{sticky:true});
    killLayers.push(dot);
    const fade=Math.max(5000,25000/Math.max(playSpeed,1));
    setTimeout(()=>{try{map.removeLayer(dot)}catch(e){};shownKills.delete(key);},fade);
  }
}

function updateKillFeedEvents(t){
  for(const ev of SESSIONS.flatMap(s=>s.events)){
    if(ev.type!=='kill') continue;
    const key=`feed_${ev.t}_${ev.victim_id}`;
    if(shownKillFeed.has(key)) continue;
    const age=t-ev.t;
    if(age<0||age>30) continue;
    shownKillFeed.add(key);
    addKillFeedEntry(ev,ev.t);
  }
  // Reset feed entries if time seeked backwards
  if(t < currentTime - 60) {
    shownKillFeed.clear();
  }
}

// ════════════════════════════════════════════════════════════════════
//  FLOT
//  Unit filter: only manoeuvre/combat units contribute (tanks, AAA, SHORAD,
//  IR SAM). Logistics trucks, scouts, MANPADS, and solitary units excluded.
//  Base weight: objectives only (no FARPs, no factories).
//  Frontier line: traditional military map style — solid line with
//  perpendicular tick marks pointing into enemy territory.
// ════════════════════════════════════════════════════════════════════
const FLOT_INT = 20;
const BASE_WEIGHT = 8;
const TICK_SPACING_M = 18000;
const TICK_LEN_M     = 6000;
const SOLO_RADIUS_M  = 6000;

// Animation state — stores spline data per team so the RAF loop can
// re-wiggle without recomputing hulls every frame
// FLOT transition state — lerps between previous and new spline when front shifts
let _flotAnimId     = null;
const LERP_DURATION = 2500; // ms to transition to new front line position
// Per-team state: { from, to, eCen, color, startMs }
// from/to are arrays of [lat,lon] spline points (same length after resampling)
let _flotBlueState  = null;
let _flotRedState   = null;

// Whitelist: unit names that count as manoeuvre/combat for FLOT purposes.
// Everything not in this set is ignored (logistics, scouts, structures, etc.)
const FLOT_COMBAT_UNITS = new Set([
  // MBTs
  'T-90','Leopard-2','M-1 Abrams','Leclerc',
  // IFV / APC (add as needed)
  'BMP-1','BMP-2','BMP-3','BTR-80','M2 Bradley','M113',
  // AAA / SHORAD
  '2S6 Tunguska','Gepard','Roland ADS','M6 Linebacker',
  // IR SAM / VSHORAD
  'Tor 9A331','M48 Chaparral','M1097 Avenger',
  // MANPADS excluded — they are individual soldiers, not a front line indicator
]);

function isFlotUnit(obj) {
  return FLOT_COMBAT_UNITS.has(obj.name);
}

// Returns true if this unit has at least one same-coalition neighbour within SOLO_RADIUS_M.
// Prevents lone scouts/broken-down vehicles from distorting the hull.
function hasFriendlyNeighbour(lat, lon, coal, allPts) {
  const cosLat = Math.cos(lat * Math.PI / 180);
  for (const p of allPts) {
    if (p[2] !== coal) continue; // [lat, lon, coal]
    const dlat = (p[0] - lat) * 111320;
    const dlon = (p[1] - lon) * 111320 * cosLat;
    if (Math.sqrt(dlat * dlat + dlon * dlon) < SOLO_RADIUS_M) return true;
  }
  return false;
}

function updateFLOT(t) {
  if (Math.abs(t - flotLastT) < FLOT_INT) return;
  flotLastT = t;

  // ── 1. Collect active combat unit positions ───────────────────────
  const candidates = []; // [lat, lon, coal, isMobile]
  for (const s of SESSIONS) {
    for (const [id, track] of Object.entries(s.tracks)) {
      const obj = _merged?.objects[id];
      if (!obj || obj.category !== 'ground') continue;
      if (!isFlotUnit(obj)) continue;
      const first = track[0].t, last = track[track.length - 1].t;
      const isStatic = track.length === 1;
      if (!isStatic && (first > t || last < t - 60)) continue;
      const idx = Math.min(unitMarkers[id]?._idx || 0, track.length - 1);
      const pt = track[idx];
      if (!pt) continue;
      const coal = obj.coalition === 'Friendlies' ? 'B' : obj.coalition === 'Hostiles' ? 'R' : null;
      if (!coal) continue;
      candidates.push([pt.lat, pt.lon, coal, !isStatic]);
    }
  }

  // ── 2. Filter solitary units, split by team ───────────────────────
  const blueUnits = [], redUnits = [];
  for (const p of candidates) {
    if (!hasFriendlyNeighbour(p[0], p[1], p[2], candidates)) continue;
    if (p[2] === 'B') blueUnits.push(p);
    else              redUnits.push(p);
  }

  // ── 3. Detect advancing clusters (6+ mobile units within 5km) ────
  // For each cluster, add extra weight points pushed outward toward enemy
  // centroid — creating a "lava bulge" on the enemy-facing side.
  const CLUSTER_RADIUS_M = 5000;
  const CLUSTER_MIN      = 6;
  const CLUSTER_WEIGHT   = 14;  // extra points per cluster
  const CLUSTER_PUSH_M   = 22000; // how far to push the bulge outward

  function addClusterBulges(units, enemyUnits, pointsArr) {
    if (units.length < CLUSTER_MIN) return;
    const eCen = centroid(enemyUnits.map(p => [p[0], p[1]]));
    const mPerDeg = 1 / 111320;
    const visited = new Set();

    for (let i = 0; i < units.length; i++) {
      if (visited.has(i)) continue;
      const [la, lo, , mobile] = units[i];
      if (!mobile) continue; // only mobile units seed clusters

      // Find all units within CLUSTER_RADIUS_M
      const cluster = [i];
      const cosLat = Math.cos(la * Math.PI / 180);
      for (let j = 0; j < units.length; j++) {
        if (j === i) continue;
        const dlat = (units[j][0] - la) * 111320;
        const dlon = (units[j][1] - lo) * 111320 * cosLat;
        if (Math.sqrt(dlat*dlat + dlon*dlon) < CLUSTER_RADIUS_M) cluster.push(j);
      }
      if (cluster.length < CLUSTER_MIN) continue;
      cluster.forEach(j => visited.add(j));

      // Cluster centroid
      const cLat = cluster.reduce((s,j)=>s+units[j][0],0)/cluster.length;
      const cLon = cluster.reduce((s,j)=>s+units[j][1],0)/cluster.length;

      // Direction from cluster centroid toward enemy centroid
      const dLat = eCen[0] - cLat;
      const dLon = (eCen[1] - cLon) * Math.cos(cLat * Math.PI / 180);
      const len  = Math.sqrt(dLat*dLat + dLon*dLon) || 1;
      const nLat = dLat / len, nLon = dLon / len;

      // Place CLUSTER_WEIGHT points in a fan on the enemy-facing side
      // Spread them across a ~60° arc to create the lava-bulge curve
      for (let k = 0; k < CLUSTER_WEIGHT; k++) {
        const angle = (k / (CLUSTER_WEIGHT - 1) - 0.5) * (Math.PI / 3); // -30° to +30°
        const rLat  =  nLat * Math.cos(angle) - nLon * Math.sin(angle);
        const rLon  =  nLat * Math.sin(angle) + nLon * Math.cos(angle);
        const cosC  = Math.cos(cLat * Math.PI / 180);
        pointsArr.push([
          cLat + rLat * CLUSTER_PUSH_M * mPerDeg,
          cLon + rLon * CLUSTER_PUSH_M * mPerDeg / cosC,
        ]);
      }
    }
  }

  // ── 4. Build hull point sets ──────────────────────────────────────
  const blue = blueUnits.map(p => [p[0], p[1]]);
  const red  = redUnits.map(p => [p[0], p[1]]);

  // Base ownership — higher weight than before
  const BASE_W_HIGH = 16;
  for (const b of _baseList) {
    if (b.isFarp || b.isFactory) continue;
    const owner = b.key ? baseOwnerAt(b.key, t) : b.coalition;
    const isBlue = owner === 'Friendlies', isRed = owner === 'Hostiles';
    for (let i = 0; i < BASE_W_HIGH; i++) {
      const da = (Math.random() - .5) * .03, dl = (Math.random() - .5) * .03;
      if (isBlue) blue.push([b.lat + da, b.lon + dl]);
      else if (isRed) red.push([b.lat + da, b.lon + dl]);
    }
  }

  // Cluster bulges
  addClusterBulges(blueUnits, redUnits,  blue);
  addClusterBulges(redUnits,  blueUnits, red);

  if (blue.length < 4 || red.length < 4) { clearFLOT(); return; }
  clearFLOT();

  const bH = convexHull(blue), rH = convexHull(red);
  if (!bH.length || !rH.length) return;

  // ── 5. Filled hulls ───────────────────────────────────────────────
  flotBlueFill = L.polygon(bH, {
    pane:'flotPane', color:'#3399ff', weight:0,
    fillColor:'#3399ff', fillOpacity:.07, interactive:false
  }).addTo(map);
  flotRedFill = L.polygon(rH, {
    pane:'flotPane', color:'#ff4433', weight:0,
    fillColor:'#ff4433', fillOpacity:.07, interactive:false
  }).addTo(map);

  // ── 6. Frontier splines + transition ─────────────────────────────
  const bFront = filterThroughBases(frontierEdge(bH, red),  'Friendlies', t);
  const rFront = filterThroughBases(frontierEdge(rH, blue), 'Hostiles',   t);

  const newBlue = bFront.length >= 2 ? catmullRomSpline(bFront, 20) : null;
  const newRed  = rFront.length >= 2 ? catmullRomSpline(rFront, 20) : null;
  const nowMs   = performance.now();

  if (newBlue) {
    const from = _flotBlueState ? resampleTo(_flotBlueState.current || _flotBlueState.to, newBlue.length) : newBlue;
    _flotBlueState = { from, to: newBlue, eCen: centroid(red),  color: '#4499ff', startMs: nowMs };
    if (!flotBlueLine) flotBlueLine = L.featureGroup([], { pane:'flotPane', interactive:false }).addTo(map);
  } else { _flotBlueState = null; }

  if (newRed) {
    const from = _flotRedState ? resampleTo(_flotRedState.current || _flotRedState.to, newRed.length) : newRed;
    _flotRedState = { from, to: newRed, eCen: centroid(blue), color: '#ff4433', startMs: nowMs };
    if (!flotRedLine) flotRedLine = L.featureGroup([], { pane:'flotPane', interactive:false }).addTo(map);
  } else { _flotRedState = null; }

  stopFlotAnim();
  if (_flotBlueState || _flotRedState)
    _flotAnimId = requestAnimationFrame(_flotTransitionTick);
}
// ── Military front line renderer ─────────────────────────────────────
// Draws a solid polyline with perpendicular tick marks every TICK_SPACING_M,
// ticks pointing toward the enemy centroid (into enemy territory).
// ── Catmull-Rom spline interpolation ────────────────────────────────
// Given a list of [lat,lon] control points, returns a smoothed polyline
// with `steps` interpolated points between each pair.
// ── Catmull-Rom spline ───────────────────────────────────────────────
function catmullRomSpline(pts, steps) {
  if (pts.length < 2) return pts.slice();
  const result = [];
  const p = [pts[0], ...pts, pts[pts.length - 1]];
  for (let i = 1; i < p.length - 2; i++) {
    const p0=p[i-1], p1=p[i], p2=p[i+1], p3=p[i+2];
    for (let j = 0; j < steps; j++) {
      const t=j/steps, t2=t*t, t3=t2*t;
      result.push([
        0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3),
      ]);
    }
  }
  result.push(pts[pts.length - 1]);
  return result;
}

// ── Resample a spline to a target point count (for lerping between different-length splines) ──
function resampleTo(pts, n) {
  if (pts.length === n) return pts.slice();
  if (pts.length < 2) return Array(n).fill(pts[0] || [0,0]);
  // Build cumulative distance index
  const cumd = [0];
  for (let i = 1; i < pts.length; i++)
    cumd.push(cumd[i-1] + haverM(pts[i-1][0],pts[i-1][1],pts[i][0],pts[i][1]));
  const total = cumd[cumd.length-1];
  const result = [];
  for (let k = 0; k < n; k++) {
    const target = (k / (n-1)) * total;
    // Binary search for segment
    let lo=0, hi=cumd.length-2;
    while (lo < hi) { const mid=(lo+hi)>>1; if (cumd[mid+1]<target) lo=mid+1; else hi=mid; }
    const segLen = cumd[lo+1]-cumd[lo];
    const frac   = segLen > 0 ? (target-cumd[lo])/segLen : 0;
    result.push([
      pts[lo][0]+(pts[lo+1][0]-pts[lo][0])*frac,
      pts[lo][1]+(pts[lo+1][1]-pts[lo][1])*frac,
    ]);
  }
  return result;
}

// ── Lerp between two equal-length splines ────────────────────────────
function lerpSpline(from, to, t) {
  return from.map((p,i) => [p[0]+(to[i][0]-p[0])*t, p[1]+(to[i][1]-p[1])*t]);
}

// ── Centroid ─────────────────────────────────────────────────────────
function centroid(pts) {
  if (!pts.length) return [0,0];
  const s = pts.reduce((a,p)=>[a[0]+p[0],a[1]+p[1]],[0,0]);
  return [s[0]/pts.length, s[1]/pts.length];
}

// ── Haversine distance in metres ─────────────────────────────────────
function haverM(la, lo, lb, lob) {
  const R = 6371000;
  const dLat=(lb-la)*Math.PI/180, dLon=(lob-lo)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(la*Math.PI/180)*Math.cos(lb*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

// ── Tick marks along a spline ─────────────────────────────────────────
function buildTicks(splinePts, eCen) {
  const ticks=[], mPerDeg=1/111320;
  let cumDist=0, nextTick=TICK_SPACING_M/2;
  for (let i=0; i<splinePts.length-1; i++) {
    const [la,lo]=splinePts[i],[lb,lob]=splinePts[i+1];
    const segLen=haverM(la,lo,lb,lob), cumEnd=cumDist+segLen;
    while (nextTick<cumEnd) {
      const frac=segLen>0?(nextTick-cumDist)/segLen:0;
      const lat=la+(lb-la)*frac, lon=lo+(lob-lo)*frac;
      const dLat=lb-la, dLon=(lob-lo)*Math.cos(lat*Math.PI/180);
      const bear=Math.atan2(dLon,dLat);
      const perpA=bear+Math.PI/2, perpB=bear-Math.PI/2;
      const cosLat=Math.cos(lat*Math.PI/180);
      const tA=[lat+Math.cos(perpA)*TICK_LEN_M*mPerDeg, lon+Math.sin(perpA)*TICK_LEN_M*mPerDeg/cosLat];
      const tB=[lat+Math.cos(perpB)*TICK_LEN_M*mPerDeg, lon+Math.sin(perpB)*TICK_LEN_M*mPerDeg/cosLat];
      const tip=haverM(tA[0],tA[1],eCen[0],eCen[1])<haverM(tB[0],tB[1],eCen[0],eCen[1])?tA:tB;
      ticks.push([[lat,lon],tip]);
      nextTick+=TICK_SPACING_M;
    }
    cumDist=cumEnd;
  }
  return ticks;
}

// ── Transition RAF loop ───────────────────────────────────────────────
// Runs only while a transition is in progress (stops when both reach target).
// Lerps the spline points from the previous position to the new one over
// LERP_DURATION ms, then holds the final position with no further animation.
function _flotTransitionTick(now) {
  if (!filters.flot) { _flotAnimId = null; return; }

  let stillMoving = false;

  for (const [state, group] of [[_flotBlueState, flotBlueLine],[_flotRedState, flotRedLine]]) {
    if (!state || !group) continue;
    const elapsed = now - state.startMs;
    const t = Math.min(elapsed / LERP_DURATION, 1);
    // Ease in-out cubic
    const ease = t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
    const current = ease >= 1 ? state.to : lerpSpline(state.from, state.to, ease);
    state.current = current;

    group.clearLayers();
    L.polyline(current, {
      pane:'flotPane', color:state.color, weight:2.5, opacity:0.90, interactive:false
    }).addTo(group);
    for (const [s,e] of buildTicks(current, state.eCen)) {
      L.polyline([s,e], {pane:'flotPane',color:state.color,weight:2,opacity:0.85,interactive:false}).addTo(group);
    }

    if (t < 1) stillMoving = true;
  }

  if (stillMoving) {
    _flotAnimId = requestAnimationFrame(_flotTransitionTick);
  } else {
    _flotAnimId = null; // Transition complete — stop the loop
  }
}

function stopFlotAnim() {
  if (_flotAnimId) { cancelAnimationFrame(_flotAnimId); _flotAnimId = null; }
}

function filterThroughBases(pts, coalition, t) {
  return pts.filter(p => {
    for (const b of _baseList) {
      if (b.isFarp || b.isFactory) continue;
      const own = b.key ? baseOwnerAt(b.key, t) : b.coalition;
      const same = (coalition === 'Friendlies' && own === 'Friendlies') ||
                   (coalition === 'Hostiles'   && own === 'Hostiles');
      if (!same) continue;
      const dlat = (p[0] - b.lat) * 111320;
      const dlon = (p[1] - b.lon) * 111320 * Math.cos(b.lat * Math.PI / 180);
      if (Math.sqrt(dlat*dlat + dlon*dlon) < 18520) return false;
    }
    return true;
  });
}

function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const s = pts.slice().sort((a, b) => a[1] !== b[1] ? a[1]-b[1] : a[0]-b[0]);
  const cross = (o, a, b) => (a[1]-o[1])*(b[0]-o[0]) - (a[0]-o[0])*(b[1]-o[1]);
  const lo = [], hi = [];
  for (const p of s) {
    while (lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], p) <= 0) lo.pop();
    lo.push(p);
  }
  for (let i = s.length-1; i >= 0; i--) {
    const p = s[i];
    while (hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], p) <= 0) hi.pop();
    hi.push(p);
  }
  hi.pop(); lo.pop();
  return lo.concat(hi);
}

function frontierEdge(hull, enemy) {
  if (!hull.length || !enemy.length) return [];
  const ec = enemy.reduce((a, p) => [a[0]+p[0], a[1]+p[1]], [0, 0]);
  const eCen = [ec[0]/enemy.length, ec[1]/enemy.length];
  const oc = hull.reduce((a, p) => [a[0]+p[0], a[1]+p[1]], [0, 0]);
  const oCen = [oc[0]/hull.length, oc[1]/hull.length];
  const dx = eCen[1]-oCen[1], dy = eCen[0]-oCen[0];
  let front = hull.filter(p => (p[1]-oCen[1])*dx + (p[0]-oCen[0])*dy > 0);
  if (front.length < 2) front = hull.slice();
  front.sort((a, b) =>
    Math.atan2(a[0]-oCen[0], a[1]-oCen[1]) - Math.atan2(b[0]-oCen[0], b[1]-oCen[1])
  );
  return front;
}

function clearFLOT() {
  stopFlotAnim();
  _flotBlueState = null; _flotRedState = null;
  for (const l of [flotBlueFill, flotBlueLine, flotRedFill, flotRedLine])
    if (l) { try { map.removeLayer(l); } catch(e) {} }
  flotBlueFill = flotBlueLine = flotRedFill = flotRedLine = null;
  flotLastT = -9999;
}

// ════════════════════════════════════════════════════════════════════
//  PLAYBACK
// ════════════════════════════════════════════════════════════════════
function tick(raf){
  if(!playing) return;
  if(lastRaf!==null){
    const dt=(raf-lastRaf)/1000;
    currentTime=Math.min(currentTime+dt*playSpeed,campaignDur);
    if(currentTime>=campaignDur){currentTime=campaignDur;playing=false;updPlayBtn();}
    updateDisplay();
  }
  lastRaf=raf;
  if(playing) rafId=requestAnimationFrame(tick);
}
function startPlay(){if(currentTime>=campaignDur)currentTime=parseFloat(document.getElementById('scrubber').min||0);playing=true;lastRaf=null;updPlayBtn();rafId=requestAnimationFrame(tick);}
function pausePlay(){playing=false;lastRaf=null;updPlayBtn();if(rafId)cancelAnimationFrame(rafId);}
function updPlayBtn(){document.getElementById('btn-play').classList.toggle('active',playing);}
function seekTo(t){
  const wasAfter=t<currentTime;
  currentTime=Math.max(0,Math.min(t,campaignDur));
  flotLastT=-9999;shownKills.clear();
  if(wasAfter){shownKillFeed.clear();}
  updateDisplay();
}

// ════════════════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click',()=>{if(!playing)startPlay();});
document.getElementById('btn-pause').addEventListener('click',pausePlay);
document.getElementById('btn-prev').addEventListener('click',()=>{pausePlay();seekTo(0);});
document.getElementById('btn-next').addEventListener('click',()=>{pausePlay();seekTo(campaignDur);});
document.getElementById('scrubber').addEventListener('input',e=>{pausePlay();seekTo(parseFloat(e.target.value));});
document.querySelectorAll('.spdbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.spdbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');playSpeed=parseInt(btn.dataset.spd);
  });
});
document.getElementById('f-player').addEventListener('change',e=>{filters.playerAir=e.target.checked;updateDisplay();});
document.getElementById('f-ai').addEventListener('change',e=>{filters.aiAir=e.target.checked;updateDisplay();});
document.getElementById('f-ground').addEventListener('change',e=>{filters.ground=e.target.checked;updateDisplay();});
document.getElementById('f-ground-labels').addEventListener('change',e=>{
  filters.groundLabels=e.target.checked;
  for(const [id,glbl] of Object.entries(groundLabels)){
    const marker=unitMarkers[id];
    const show=filters.groundLabels&&marker&&marker._vis;
    if(show && !glbl._vis){
      // Sync position from current marker position before adding
      const ll=marker.getLatLng();
      glbl.setLatLng(ll);
      glbl.addTo(map);
      glbl._vis=true;
    } else if(!show && glbl._vis){
      map.removeLayer(glbl);
      glbl._vis=false;
    }
  }
});
document.getElementById('f-trails').addEventListener('change',e=>{
  filters.trails=e.target.checked;
  if(!filters.trails) for(const segs of Object.values(unitTrails)) for(const p of segs) p.setLatLngs([]);
  else updateDisplay();
});
document.getElementById('f-kills').addEventListener('change',e=>{filters.kills=e.target.checked;});
document.getElementById('f-bases').addEventListener('change',e=>{
  filters.bases=e.target.checked;
  for(const m of Object.values(baseMarkers))filters.bases?m.addTo(map):map.removeLayer(m);
  for(const c of Object.values(baseCircles))filters.bases?c.addTo(map):map.removeLayer(c);
  for(const l of Object.values(baseLabels))filters.bases?l.addTo(map):map.removeLayer(l);
});
// FLOT disabled — event listener stubbed
// document.getElementById('f-flot').addEventListener('change',e=>{
//   filters.flot=e.target.checked;
//   if(!filters.flot){clearFLOT();}else{flotLastT=-9999;updateFLOT(currentTime);}
// });
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.code==='Space'){e.preventDefault();playing?pausePlay():startPlay();}
  if(e.code==='ArrowRight') seekTo(currentTime+60);
  if(e.code==='ArrowLeft')  seekTo(currentTime-60);
  if(e.code==='ArrowUp')    seekTo(currentTime+300);
  if(e.code==='ArrowDown')  seekTo(currentTime-300);
});

// ════════════════════════════════════════════════════════════════════
//  BOOT  —  load campaigns.json then seed dropdowns
// ════════════════════════════════════════════════════════════════════
(async () => {
  setLoad('Loading campaign list…');
  document.getElementById('loading').style.display = 'flex';
  await loadCampaignsJSON();
  populateSelector();
  // populateSelector calls populateSessionSelector which calls loadSession automatically
})();
</script>
