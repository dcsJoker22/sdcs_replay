<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic DCS — Campaign Replay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--panel:#161b22;--panel2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--dim:#8b949e;--blue:#58a6ff;--red:#f85149;
  --green:#3fb950;--yellow:#d29922;--accent:#1f6feb;--r:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 14px;display:flex;align-items:center;gap:10px;height:44px;flex-shrink:0;z-index:1000}
#topbar h1{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.5px;white-space:nowrap}
#campaign-selector{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:3px 7px;border-radius:var(--r);font-size:12px;cursor:pointer}
#session-badge{background:var(--panel2);border:1px solid var(--border);padding:2px 7px;
  border-radius:var(--r);font-size:11px;color:var(--dim);white-space:nowrap}
#wallclock{font-size:13px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;
  margin-left:auto;white-space:nowrap}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}
#map{flex:1;background:#111}

/* SIDEBAR */
#sidebar{width:268px;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-sec{border-bottom:1px solid var(--border);padding:9px 11px}
.sb-sec h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:7px}
.frow{display:flex;align-items:center;gap:7px;margin-bottom:3px;cursor:pointer;user-select:none;font-size:12px}
.frow input[type=checkbox]{accent-color:var(--blue);width:12px;height:12px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#players-list{flex:1;overflow-y:auto;padding:9px}
.pcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s,background .15s}
.pcard:hover{background:var(--panel2)}
.pcard.active{border-color:var(--blue);background:rgba(88,166,255,.05)}
.pc-hd{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.pc-cs{font-weight:700;font-size:13px;flex:1}
.pc-tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0}
.tag-blue{background:rgba(88,166,255,.2);color:var(--blue)}
.tag-red{background:rgba(248,81,73,.2);color:var(--red)}
.pc-st{color:var(--dim);font-size:11px;display:flex;gap:7px;flex-wrap:wrap}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* TIMELINE */
#timeline-bar{background:var(--panel);border-top:1px solid var(--border);
  padding:7px 13px 9px;flex-shrink:0}
#tl-controls{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cbtn{background:var(--border);border:none;color:var(--text);padding:3px 8px;
  border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s;flex-shrink:0}
.cbtn:hover{background:#444c56}
.cbtn.active{background:var(--accent);color:#fff}
.spdbtn{font-size:11px;font-weight:700;min-width:38px;padding:3px 6px}
#tl-time{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap}
#scrubber-wrap{position:relative;height:34px}
#tl-bg{position:absolute;top:13px;left:0;right:0;height:8px;background:var(--border);border-radius:4px;pointer-events:none;z-index:1}
#tl-sessions{position:absolute;top:13px;left:0;right:0;height:8px;border-radius:4px;pointer-events:none;z-index:2;overflow:hidden}
#tl-events{position:absolute;top:0;left:0;right:0;height:34px;pointer-events:none;z-index:4}
.tpip{position:absolute;width:3px;border-radius:1px;top:5px;height:22px;transform:translateX(-50%);pointer-events:all;cursor:pointer}
.sess-lbl{position:absolute;top:23px;font-size:9px;color:var(--dim);transform:translateX(-50%);white-space:nowrap;pointer-events:none}
#scrubber{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:transparent;
  outline:none;position:absolute;top:15px;cursor:pointer;z-index:3}
#scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--blue);border:2px solid var(--bg);box-shadow:0 0 5px rgba(88,166,255,.6);cursor:pointer}

/* DETAIL PANEL */
#detail-panel{display:none;position:absolute;top:54px;right:276px;width:258px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:13px;z-index:2000;box-shadow:0 6px 24px rgba(0,0,0,.6)}
#detail-panel h2{font-size:14px;font-weight:700}
.dp-sub{color:var(--dim);font-size:11px;margin:3px 0 11px}
.dp-sec{margin-bottom:9px}
.dp-sec h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.kill-row{background:var(--bg);border-radius:4px;padding:4px 7px;margin-bottom:3px;font-size:11px}
.kill-row b{display:block;margin-bottom:1px}
.kill-row span{color:var(--dim)}
.fl-row{background:var(--bg);border-radius:4px;padding:4px 7px;margin-bottom:3px;
  font-size:11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fl-row:hover{background:var(--panel2)}
.fl-row span{color:var(--dim)}
#close-dp{float:right;background:none;border:none;color:var(--dim);font-size:17px;cursor:pointer;line-height:1;padding:0;margin-top:-2px}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;gap:13px}
#loading h2{color:var(--blue);font-size:18px}
#loading p{color:var(--dim);font-size:12px}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEAFLET */
.leaflet-tooltip{background:var(--panel)!important;border:1px solid var(--border)!important;
  color:var(--text)!important;font-size:11px!important;border-radius:4px!important;
  padding:3px 7px!important;box-shadow:0 2px 8px rgba(0,0,0,.4)!important}

/* PILOT LABELS */
.plabel{background:none!important;border:none!important;box-shadow:none!important;
  padding:0!important;pointer-events:none}
.plabel-inner{display:inline-flex;flex-direction:column;align-items:flex-start;gap:0px;
  padding-left:4px}
.plabel-name{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:800;
  white-space:nowrap;letter-spacing:0.2px;
  text-shadow:0 0 4px #000,0 0 8px #000,-1px -1px 0 #000,1px 1px 0 #000}
.plabel-name.blue{color:#58a6ff}
.plabel-name.red{color:#f85149}
.plabel-telem{font-family:'Courier New',monospace;font-size:10px;font-weight:700;
  color:#aaddaa;white-space:nowrap;
  text-shadow:0 0 3px #000,1px 1px 0 #000}

/* EXPLOSION */
.expmark{background:none!important;border:none!important;box-shadow:none!important;pointer-events:none}
@keyframes er1{0%{transform:translate(-50%,-50%) scale(.1);opacity:1}60%{opacity:.8}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes er2{0%{transform:translate(-50%,-50%) scale(.1);opacity:.7}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}}
@keyframes ec{0%{transform:translate(-50%,-50%) scale(.2);opacity:1}30%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(.6);opacity:0}}
@keyframes esk{0%{transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2) rotate(15deg);opacity:0}}

/* TRAIL GRADIENT — handled via canvas overlay on polylines via filter */
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <h2>Strategic DCS — Campaign Replay</h2>
  <p id="load-msg">Initialising…</p>
</div>

<div id="topbar">
  <h1>🎯 SDCS REPLAY</h1>
  <select id="campaign-selector"><option>Loading…</option></select>
  <span id="session-badge">—</span>
  <div id="wallclock">—</div>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div class="sb-sec">
      <h3>Display Layers</h3>
      <label class="frow"><input type="checkbox" id="f-player" checked><span class="dot" style="background:#58a6ff"></span>Player Aircraft</label>
      <label class="frow"><input type="checkbox" id="f-ai"><span class="dot" style="background:#bc8cff"></span>AI Aircraft</label>
      <label class="frow"><input type="checkbox" id="f-ground" checked><span class="dot" style="background:#3fb950"></span>Ground Units</label>
      <label class="frow"><input type="checkbox" id="f-trails" checked><span class="dot" style="background:#555"></span>Trails</label>
      <label class="frow"><input type="checkbox" id="f-kills" checked><span class="dot" style="background:#f85149"></span>Kill Events</label>
      <label class="frow"><input type="checkbox" id="f-bases" checked><span class="dot" style="background:#d29922"></span>Bases / FARPs</label>
      <label class="frow"><input type="checkbox" id="f-flot" checked><span class="dot" style="background:#aaa;border-radius:2px"></span>Front Line (FLOT)</label>
    </div>
    <div class="sb-sec" style="padding-bottom:5px"><h3>Players</h3></div>
    <div id="players-list"></div>
  </div>
</div>

<div id="timeline-bar">
  <div id="tl-controls">
    <button class="cbtn" id="btn-prev">⏮</button>
    <button class="cbtn" id="btn-play">▶</button>
    <button class="cbtn" id="btn-pause">⏸</button>
    <button class="cbtn" id="btn-next">⏭</button>
    <!-- Individual speed buttons -->
    <button class="cbtn spdbtn" data-spd="1">1×</button>
    <button class="cbtn spdbtn" data-spd="5">5×</button>
    <button class="cbtn spdbtn" data-spd="10">10×</button>
    <button class="cbtn spdbtn active" data-spd="30">30×</button>
    <button class="cbtn spdbtn" data-spd="100">100×</button>
    <button class="cbtn spdbtn" data-spd="300">300×</button>
    <span id="tl-time">0:00:00 / 0:00:00</span>
  </div>
  <div id="scrubber-wrap">
    <div id="tl-bg"></div>
    <div id="tl-sessions"></div>
    <div id="tl-events"></div>
    <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1">
  </div>
</div>

<div id="detail-panel">
  <button id="close-dp">×</button>
  <h2 id="dp-cs"></h2>
  <div class="dp-sub" id="dp-sub"></div>
  <div class="dp-sec"><h4>Flights</h4><div id="dp-flights"></div></div>
  <div class="dp-sec"><h4>Kill Events</h4><div id="dp-kills"></div></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════════
const CAMPAIGNS = {
  'Germany — Feb 26 2026': [
    { label:'Session 1 · 07:46Z', file:'session1.json' },
    // { label:'Session 2 · 13:46Z', file:'session2.json' },
  ],
};
const SDCS_API = null; // e.g. 'https://map.strategic-dcs.com/api/bases'

// ════════════════════════════════════════════════════════════════════
//  TOP-DOWN AIRCRAFT SVG ICONS
//  All drawn pointing UP (north), rotated by heading at runtime.
//  Coordinate space varies per icon but anchor is always centre.
// ════════════════════════════════════════════════════════════════════
const AC_ICONS = {
  // F-16C — cranked delta, single engine, narrow fuselage
  'F-16': `
    <polygon points="16,2 19,10 18,22 16,26 14,22 13,10" />
    <polygon points="16,18 26,30 18,22" />
    <polygon points="16,18 6,30 14,22" />
    <rect x="14" y="25" width="4" height="6" rx="1"/>
    <ellipse cx="16" cy="8" rx="2" ry="4" opacity=".5"/>`,

  // FA-18C — twin tail, wide LEX, dogleg wings
  'FA-18': `
    <polygon points="16,2 19,9 18,20 16,23 14,20 13,9" />
    <polygon points="16,15 27,27 18,20" />
    <polygon points="16,15 5,27 14,20" />
    <polygon points="11,8 5,16 13,13" />
    <polygon points="21,8 27,16 19,13" />
    <line x1="14" y1="22" x2="11" y2="30" stroke-width="2"/>
    <line x1="18" y1="22" x2="21" y2="30" stroke-width="2"/>`,

  // MiG-29 — twin tail, wide blended wing-body
  'MiG-29': `
    <polygon points="16,2 19,9 18,19 16,22 14,19 13,9" />
    <polygon points="16,14 28,27 18,19" />
    <polygon points="16,14 4,27 14,19" />
    <polygon points="10,7 4,15 13,12" />
    <polygon points="22,7 28,15 19,12" />
    <line x1="14" y1="21" x2="12" y2="29" stroke-width="2"/>
    <line x1="18" y1="21" x2="20" y2="29" stroke-width="2"/>`,

  // Su-27 — ogival delta, twin tail, long nose
  'Su-27': `
    <polygon points="16,1 18,8 18,19 16,22 14,19 14,8" />
    <polygon points="16,13 29,27 18,19" />
    <polygon points="16,13 3,27 14,19" />
    <polygon points="10,6 3,15 13,11" />
    <polygon points="22,6 29,15 19,11" />
    <line x1="14" y1="20" x2="11" y2="29" stroke-width="2.5"/>
    <line x1="18" y1="20" x2="21" y2="29" stroke-width="2.5"/>`,

  // A-10 — straight wing, twin boom tail, wide span
  'A-10': `
    <ellipse cx="16" cy="14" rx="3" ry="9"/>
    <rect x="4" y="11" width="24" height="4" rx="1"/>
    <line x1="6" y1="15" x2="4" y2="22" stroke-width="2.5"/>
    <line x1="26" y1="15" x2="28" y2="22" stroke-width="2.5"/>
    <line x1="10" y1="22" x2="22" y2="22" stroke-width="2"/>`,

  // AH-64D — attack helo top-down: slim fuselage, stub wings, rotors as thin cross
  'AH-64': `
    <ellipse cx="16" cy="16" rx="3" ry="9"/>
    <line x1="2" y1="16" x2="30" y2="16" stroke-width="1.5" opacity=".7"/>
    <line x1="16" y1="2" x2="16" y2="30" stroke-width="1.5" opacity=".7"/>
    <rect x="10" y="13" width="12" height="6" rx="2"/>
    <line x1="6" y1="15" x2="4" y2="19" stroke-width="2"/>
    <line x1="26" y1="15" x2="28" y2="19" stroke-width="2"/>
    <line x1="16" y1="24" x2="24" y2="27" stroke-width="1.5"/>`,

  // UH-1H — utility helo, slim body, large rotor
  'UH-60': `
    <ellipse cx="16" cy="16" rx="4" ry="9"/>
    <line x1="1" y1="15" x2="31" y2="15" stroke-width="1.5" opacity=".6"/>
    <line x1="16" y1="1" x2="16" y2="31" stroke-width="1.5" opacity=".6"/>
    <rect x="11" y="12" width="10" height="8" rx="2"/>
    <line x1="16" y1="24" x2="24" y2="27" stroke-width="1.5"/>`,

  // Mi-8 — large transport helo, wide cabin
  'Mi-8': `
    <ellipse cx="16" cy="15" rx="5" ry="10"/>
    <line x1="0" y1="14" x2="32" y2="14" stroke-width="2" opacity=".6"/>
    <line x1="16" y1="0" x2="16" y2="32" stroke-width="2" opacity=".6"/>
    <rect x="10" y="10" width="12" height="10" rx="2"/>
    <line x1="16" y1="23" x2="25" y2="27" stroke-width="2"/>`,

  // CH-47 — tandem rotor, large banana fuselage
  'CH-47': `
    <ellipse cx="16" cy="16" rx="5" ry="12"/>
    <line x1="0" y1="8" x2="32" y2="8" stroke-width="2" opacity=".6"/>
    <line x1="16" y1="0" x2="16" y2="10" stroke-width="2" opacity=".6"/>
    <line x1="0" y1="24" x2="32" y2="24" stroke-width="2" opacity=".6"/>
    <line x1="16" y1="22" x2="16" y2="32" stroke-width="2" opacity=".6"/>`,

  // E-2D — AWACS, radome disc on top, short swept wings
  'E-2': `
    <polygon points="16,4 19,12 17,20 16,22 15,20 13,12" />
    <polygon points="16,10 25,18 17,14" />
    <polygon points="16,10 7,18 15,14" />
    <ellipse cx="16" cy="10" rx="10" ry="3.5"/>`,

  // Generic fixed-wing
  'default-air': `
    <polygon points="16,2 19,12 17,22 16,24 15,22 13,12"/>
    <polygon points="16,15 24,26 17,20"/>
    <polygon points="16,15 8,26 15,20"/>`,

  // Generic ground diamond
  'default-ground': `<polygon points="16,4 28,16 16,28 4,16"/>`,
};

function iconKey(name, cat) {
  if (!name) return cat==='ground'?'default-ground':'default-air';
  const n = name.toUpperCase();
  if (n.includes('AH-64')||n.includes('AH64')) return 'AH-64';
  if (n.includes('UH-1')||n.includes('UH1'))   return 'UH-60';
  if (n.includes('UH-60'))                      return 'UH-60';
  if (n.includes('CH-47'))                      return 'CH-47';
  if (n.includes('MI-8')||n.includes('MI8'))    return 'Mi-8';
  if (n.includes('FA-18')||n.includes('F/A-18'))return 'FA-18';
  if (n.includes('F-16')||n.includes('F16'))    return 'F-16';
  if (n.includes('A-10')||n.includes('A10'))    return 'A-10';
  if (n.includes('MIG-29')||n.includes('MIG29'))return 'MiG-29';
  if (n.includes('SU-27')||n.includes('SU27'))  return 'Su-27';
  if (n.includes('E2-')||n.includes('E-2'))     return 'E-2';
  if (cat==='ground')                           return 'default-ground';
  return 'default-air';
}

function makeACSVG(key, color, sz, hdg, selected) {
  const body = AC_ICONS[key] || AC_ICONS['default-air'];
  const isGnd = key==='default-ground';
  const rot = (hdg!=null && !isGnd) ? `rotate(${hdg},16,16)` : '';
  const sel = selected ? `<circle cx="16" cy="16" r="14" fill="none" stroke="#fff" stroke-width="1.5" opacity=".6"/>` : '';
  // viewBox is always 32x32, scaled to sz
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 32 32">
    <g transform="${rot}" fill="${color}" stroke="${color}" stroke-width=".6" opacity=".93">${body}</g>${sel}</svg>`;
}

function leafletIcon(cat, name, coalition, hdg, sel, isHuman) {
  const blue = coalition==='Friendlies';
  const color = blue ? '#58a6ff' : '#f85149';
  const key = iconKey(name, cat);
  const sz = isHuman ? 24 : (cat==='player_air' ? 20 : 12);
  const svg = makeACSVG(key, color, sz, hdg, sel);
  return L.divIcon({ html:svg, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] });
}

// ════════════════════════════════════════════════════════════════════
//  MAP SETUP
// ════════════════════════════════════════════════════════════════════
const map = L.map('map', {center:[51.68,10.5],zoom:7,zoomControl:true,attributionControl:false});
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:18}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:18,opacity:0.45,subdomains:'abcd'}).addTo(map);

// Custom pane for base circles — sits below unit markers but above tiles
map.createPane('basePane'); map.getPane('basePane').style.zIndex=350;
map.createPane('flotPane'); map.getPane('flotPane').style.zIndex=340;

// ════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════
let SESSIONS=[], currentTime=0, campaignDur=0, playing=false, playSpeed=30;
let lastRaf=null, rafId=null, selectedPlayer=null;

const unitMarkers={}, unitTrails={}, pilotLabels={};
const baseMarkers={}, baseCircles={};
let _merged=null;

// FLOT
let flotBlueFill=null, flotBlueLine=null, flotRedFill=null, flotRedLine=null;
let flotLastT=-9999;
let _baseList=[];   // [{lat,lon,coalition}] used for FLOT weighting

const shownKills=new Set(), killLayers=[];
let filters={playerAir:true,aiAir:false,ground:true,trails:true,kills:true,bases:true,flot:true};

// ════════════════════════════════════════════════════════════════════
//  CAMPAIGN LOADING
// ════════════════════════════════════════════════════════════════════
function populateSelector(){
  const sel=document.getElementById('campaign-selector');
  sel.innerHTML='';
  Object.keys(CAMPAIGNS).forEach(n=>{const o=document.createElement('option');o.value=o.textContent=n;sel.appendChild(o);});
  sel.addEventListener('change',()=>loadCampaign(sel.value));
}

async function loadCampaign(name){
  setLoad('Loading campaign…');
  document.getElementById('loading').style.display='flex';
  clearAll();
  SESSIONS=[];currentTime=0;
  let offset=0;
  const defs=CAMPAIGNS[name];
  for(let i=0;i<defs.length;i++){
    setLoad(`Loading ${defs[i].label} (${i+1}/${defs.length})…`);
    const r=await fetch(defs[i].file);
    const d=await r.json();
    const s=timeShift(d,offset);
    s._label=defs[i].label;s._offset=offset;s._dur=d.meta.duration_seconds;
    SESSIONS.push(s);
    offset+=d.meta.duration_seconds;
  }
  campaignDur=offset;
  document.getElementById('scrubber').max=campaignDur;
  setLoad('Merging sessions…');
  _merged=mergeSessions(SESSIONS);
  setLoad('Initialising units…');
  initUnits(_merged);
  setLoad('Drawing bases & FARPs…');
  await initBases(_merged);
  setLoad('Building UI…');
  buildPlayerList(_merged);
  drawTimeline();
  flotLastT=-9999;
  document.getElementById('loading').style.display='none';
  document.getElementById('session-badge').textContent=`${SESSIONS.length} session${SESSIONS.length>1?'s':''} · ${fmtDur(campaignDur)}`;
  seekTo(0);
}

function timeShift(data,offset){
  if(offset===0) return JSON.parse(JSON.stringify(data));
  const d=JSON.parse(JSON.stringify(data));
  for(const tr of Object.values(d.tracks)) for(const p of tr) p.t+=offset;
  for(const e of d.events) e.t+=offset;
  for(const o of Object.values(d.objects)){o.first_seen+=offset;o.last_seen+=offset;}
  for(const p of Object.values(d.players)){
    for(const f of p.flights){f.start_t+=offset;f.end_t+=offset;}
    for(const k of p.kills) k.t+=offset;
  }
  return d;
}

function mergeSessions(sessions){
  const m={objects:{},tracks:{},events:[],statics:[],players:{},_dp:{}};
  const seenSt=new Set();
  for(const s of sessions){
    Object.assign(m.objects,s.objects);
    Object.assign(m.tracks,s.tracks);
    m.events.push(...s.events);
    for(const st of s.statics){if(!seenSt.has(st.name)){seenSt.add(st.name);m.statics.push(st);}}
    for(const [k,p] of Object.entries(s.players)){
      if(!m.players[k]) m.players[k]={callsign:p.callsign,flights:[],kills:[],deaths:0};
      m.players[k].flights.push(...p.flights);
      m.players[k].kills.push(...p.kills);
      m.players[k].deaths+=p.deaths;
    }
  }
  // dedup players
  for(const [k,p] of Object.entries(m.players)){
    const base=k.replace(/\s*\(\d+\)$/,'').trim();
    if(!m._dp[base]) m._dp[base]={callsign:base,flights:[],kills:[],deaths:0,coalition:null};
    const dp=m._dp[base];
    dp.flights.push(...p.flights);dp.kills.push(...p.kills);dp.deaths+=p.deaths;
  }
  for(const dp of Object.values(m._dp)){
    dp.coalition=dp.flights.map(f=>f.coalition).filter(Boolean)[0]||'Unknown';
  }
  return m;
}

// ════════════════════════════════════════════════════════════════════
//  UNIT INIT
//  Only show units that: are alive at t, AND have a human callsign
//  (or are AI ground/air explicitly enabled)
// ════════════════════════════════════════════════════════════════════

// A "callsign" in ACMI means the Pilot= field is NOT a bare number
function hasCallsign(obj){
  const p=obj.pilot||'';
  // Pure numeric = AI unit ID, no callsign
  return p.length>0 && !/^\d+/.test(p.replace(/\s*\(\d+\)$/,'').trim());
}

function initUnits(merged){
  for(const [id,track] of Object.entries(merged.tracks)){
    if(!track.length) continue;
    const obj=merged.objects[id];
    if(!obj) continue;
    const cat=obj.category;
    if(!['player_air','ai_air','ground'].includes(cat)) continue;

    // Filter: only units with a named callsign
    if(!hasCallsign(obj)) continue;

    const pt0=track[0];
    const isHuman=obj.is_human;
    const blue=obj.coalition==='Friendlies';

    const marker=L.marker([pt0.lat,pt0.lon],{
      icon:leafletIcon(cat,obj.name,obj.coalition,pt0.hdg,false,isHuman),
      zIndexOffset:isHuman?2000:(cat==='player_air'?1000:0),
    });
    const tip=isHuman?`<b>${obj.pilot||obj.name}</b><br>${obj.name}`:`${obj.name}`;
    marker.bindTooltip(tip,{direction:'top',offset:[0,-8]});
    if(isHuman){
      marker.on('click',()=>{
        const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
        const p=merged._dp[base];
        if(p) openDetail(base,p);
      });
    }
    marker.addTo(map);marker._vis=false;marker.setOpacity(0);
    unitMarkers[id]=marker;

    // Fading trail — starts opaque at head, fades to transparent
    const trailColor=blue?'#2a6ab0':'#a03030';
    const poly=L.polyline([],{color:trailColor,weight:isHuman?1.8:1,opacity:.5,smoothFactor:1}).addTo(map);
    unitTrails[id]=poly;

    // Permanent pilot label (human players only)
    if(isHuman){
      const clr=blue?'blue':'red';
      const lblHtml=`<div class="plabel-inner">
        <span class="plabel-name ${clr}" id="ln-${id}"></span>
        <span class="plabel-telem" id="lt-${id}"></span></div>`;
      const lblIcon=L.divIcon({html:lblHtml,className:'plabel',iconSize:[200,36],iconAnchor:[-16,30]});
      const lbl=L.marker([pt0.lat,pt0.lon],{icon:lblIcon,zIndexOffset:4000,interactive:false});
      lbl.addTo(map);lbl._vis=false;lbl.setOpacity(0);
      pilotLabels[id]=lbl;
    }
  }
}

// ════════════════════════════════════════════════════════════════════
//  BASE & FARP INIT
//  Bases: named statics with code:name pattern (eg MC82: Paderborn)
//  FARPs: FARPWatchtower ground units
// ════════════════════════════════════════════════════════════════════
async function initBases(merged){
  let bases=[];

  if(SDCS_API){
    try{
      const r=await fetch(SDCS_API);
      const d=await r.json();
      bases=d.map(b=>({
        name:b.name||b.title||b.id, code:b.code||'',
        lat:parseFloat(b.lat||b.latitude), lon:parseFloat(b.lon||b.longitude),
        coalition:b.coalition||b.side||'Neutral',
        type:b.type||'objective', isFarp:false,
      }));
    }catch(e){console.warn('SDCS API unavailable:',e.message);}
  }

  if(!bases.length){
    // Named objectives from statics (CODE: Name pattern)
    const seen=new Set();
    for(const st of merged.statics){
      if(!st.name||seen.has(st.name)) continue;
      const m=st.name.match(/^([A-Z]{2}\d{2,3}|[A-Z]\d{2,3}):\s*(.+)/);
      if(!m) continue;
      seen.add(st.name);
      bases.push({
        name:m[2].trim(), code:m[1].trim(),
        lat:st.lat, lon:st.lon,
        coalition:st.coalition, color:st.color,
        type:st.name.toLowerCase().includes(' ab')?'airbase':'objective',
        isFarp:false,
      });
    }

    // FARPWatchtower units — one per FARP cluster
    const seenFarp=new Set();
    for(const [id,obj] of Object.entries(merged.objects)){
      if(obj.name!=='FARPWatchtower') continue;
      const track=merged.tracks[id];
      if(!track||!track.length) continue;
      const pt=track[0];
      const key=`${pt.lat.toFixed(3)},${pt.lon.toFixed(3)}`;
      if(seenFarp.has(key)) continue;
      seenFarp.add(key);
      // Find matching FARP R## navaid name nearby
      let farpName='FARP';
      for(const st of merged.statics){
        if(!st.name||!st.name.match(/^FARP\s+[RB]\d+/i)) continue;
        const dlat=Math.abs(st.lat-pt.lat), dlon=Math.abs(st.lon-pt.lon);
        if(dlat<0.02&&dlon<0.02){farpName=st.name;break;}
      }
      bases.push({
        name:farpName, code:'', lat:pt.lat, lon:pt.lon,
        coalition:obj.coalition, type:'farp', isFarp:true,
      });
    }
  }

  // Store for FLOT weighting
  _baseList=bases.map(b=>({lat:b.lat,lon:b.lon,coalition:b.coalition,isFarp:b.isFarp}));

  for(const b of bases) drawBase(b);
  document.getElementById('base-legend')||null; // no legend element needed - info is in tooltips
}

function drawBase(b){
  if(!b.lat||!b.lon) return;
  const blue=b.coalition==='Friendlies'||b.coalition==='Blue';
  const red=b.coalition==='Hostiles'||b.coalition==='Red';
  const color=blue?'#58a6ff':red?'#f85149':'#888888';
  const isFarp=b.isFarp||b.type==='farp';
  const isAB=b.type==='airbase';

  // Marker icon
  let shp;
  if(isFarp){
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 11 11">
      <polygon points="5.5,0 11,5.5 5.5,11 0,5.5" fill="${color}" opacity=".9"/>
      <polygon points="5.5,2 9,5.5 5.5,9 2,5.5" fill="${color}" opacity=".4"/>
    </svg>`;
  } else if(isAB){
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
      <rect x="1" y="1" width="11" height="11" rx="2" fill="${color}" opacity=".9"/>
      <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="#000" stroke-width=".8" opacity=".4"/>
      <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="#000" stroke-width=".8" opacity=".4"/>
    </svg>`;
  } else {
    shp=`<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10">
      <polygon points="5,0 10,5 5,10 0,5" fill="${color}" opacity=".85"/>
    </svg>`;
  }
  const sz=isFarp?11:isAB?13:10;
  const icon=L.divIcon({html:shp,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
  const mk=L.marker([b.lat,b.lon],{icon,zIndexOffset:-600});
  const label=isFarp?`<b>FARP</b>${b.name&&b.name!=='FARP'?' · '+b.name:''}`:`<b>${b.name}</b>${b.code?` [${b.code}]`:''}`;
  mk.bindTooltip(`${label}<br>${blue?'🔵 Blue':'🔴 Red'} · ${b.type}`,{direction:'top',offset:[0,-5]});
  if(filters.bases) mk.addTo(map);
  baseMarkers[b.name+'_'+b.lat]=mk;

  // 10nm ownership circle — use SVG circle via L.circle
  // fillOpacity deliberately flat per circle; no stacking opacity trick needed
  // because we set a very low value and the overlapping zones are perceptually additive
  // but we want them NOT to multiply — solution: use mix-blend-mode: screen via pane CSS
  const nm10=18520;
  const circ=L.circle([b.lat,b.lon],{
    radius:nm10,
    pane:'basePane',
    color:color, weight:2, opacity:0.5,
    fillColor:color, fillOpacity:0.04,  // flat, no multiply
    interactive:false,
  });
  if(filters.bases) circ.addTo(map);
  baseCircles[b.name+'_'+b.lat]=circ;
}

// Prevent opacity multiplication on overlapping circles via CSS pane
const basePane=map.getPane('basePane');
if(basePane){
  basePane.style.mixBlendMode='screen'; // prevents dark multiply in overlap zones
}

function buildPlayerList(merged){
  const cont=document.getElementById('players-list');cont.innerHTML='';
  for(const [cs,p] of Object.entries(merged._dp)){
    const real=p.flights.filter(f=>f.aircraft&&!isWpn(f.aircraft));
    if(!real.length) continue;
    const blue=p.coalition==='Friendlies';
    const card=document.createElement('div');
    card.className='pcard';card.dataset.cs=cs;
    card.innerHTML=`<div class="pc-hd"><span class="pc-cs">${cs}</span>
      <span class="pc-tag ${blue?'tag-blue':'tag-red'}">${blue?'BLUE':'RED'}</span></div>
      <div class="pc-st"><span>✈ ${real.length} flight${real.length!==1?'s':''}</span>
      <span>💥 ${p.kills.length} kill${p.kills.length!==1?'s':''}</span>
      <span>☠ ${p.deaths}</span></div>`;
    card.addEventListener('click',()=>openDetail(cs,p));
    cont.appendChild(card);
  }
}
function isWpn(n){
  if(!n) return false;
  return ['AGM','AIM','MIM','AAM','HARM','HELLFIRE','HYDRA','ZUNI','MK-','GBU-','JDAM'].some(w=>n.toUpperCase().includes(w));
}

function openDetail(cs,player){
  selectedPlayer=cs;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('active',c.dataset.cs===cs));
  document.getElementById('dp-cs').textContent=cs;
  const blue=player.coalition==='Friendlies';
  document.getElementById('dp-sub').textContent=
    `${blue?'🔵 Blue':'🔴 Red'} · ${player.flights.filter(f=>!isWpn(f.aircraft)).length} flights · ${player.kills.length} kills · ${player.deaths} deaths`;
  const fEl=document.getElementById('dp-flights');fEl.innerHTML='';
  const real=player.flights.filter(f=>!isWpn(f.aircraft));
  if(!real.length){fEl.innerHTML='<div style="color:var(--dim);font-size:11px">No tracked flights</div>';}
  else for(const fl of real){
    const d=document.createElement('div');d.className='fl-row';
    d.innerHTML=`<b>${fl.aircraft}</b><span>${fl.duration_min}min · ${fmtT(fl.start_t)}</span>`;
    d.addEventListener('click',()=>{seekTo(fl.start_t);focusObj(fl.obj_id);});
    fEl.appendChild(d);
  }
  const kEl=document.getElementById('dp-kills');kEl.innerHTML='';
  if(!player.kills.length){kEl.innerHTML='<div style="color:var(--dim);font-size:11px">No kills</div>';}
  else for(const k of player.kills){
    const d=document.createElement('div');d.className='kill-row';
    d.innerHTML=`<b>${k.victim||'?'}</b><span>${k.weapon||'?'} · ${fmtT(k.t)}</span>`;
    if(k.lat&&k.lon){d.style.cursor='pointer';d.addEventListener('click',()=>{seekTo(k.t);map.setView([k.lat,k.lon],12);});}
    kEl.appendChild(d);
  }
  document.getElementById('detail-panel').style.display='block';
  highlightTrails();
}
document.getElementById('close-dp').addEventListener('click',()=>{
  document.getElementById('detail-panel').style.display='none';
  selectedPlayer=null;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));
  highlightTrails();
});
function highlightTrails(){
  if(!_merged) return;
  for(const [id,poly] of Object.entries(unitTrails)){
    const obj=_merged.objects[id];if(!obj) continue;
    const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
    const sel=base===selectedPlayer;
    const blue=obj.coalition==='Friendlies';
    poly.setStyle(sel?{color:'#fff',weight:2.5,opacity:.9}:{color:blue?'#2a6ab0':'#a03030',weight:obj.is_human?1.8:1,opacity:.5});
    if(sel) poly.bringToFront();
  }
}
function focusObj(id){
  const track=_merged?.tracks[id];if(!track) return;
  const pt=track.reduce((b,p)=>Math.abs(p.t-currentTime)<Math.abs(b.t-currentTime)?p:b);
  map.setView([pt.lat,pt.lon],11);
}

// ════════════════════════════════════════════════════════════════════
//  MAIN UPDATE LOOP
// ════════════════════════════════════════════════════════════════════
const TRAIL_SECS=240; // 4 min trail that fades over its length

function updateDisplay(){
  const t=currentTime;
  // Wall clock
  let wc=fmtT(t);
  if(SESSIONS.length){
    const s=SESSIONS.slice().reverse().find(s=>t>=s._offset)||SESSIONS[0];
    if(s?.meta?.reference_time){
      const ms=new Date(s.meta.reference_time).getTime()+(t-s._offset)*1000;
      wc=new Date(ms).toUTCString().slice(5,22)+' Z';
    }
  }
  document.getElementById('wallclock').textContent=wc;
  document.getElementById('tl-time').textContent=`${fmtT(t)} / ${fmtDur(campaignDur)}`;
  document.getElementById('scrubber').value=t;

  for(const s of SESSIONS){
    for(const [id,track] of Object.entries(s.tracks)){
      updateUnit(id,track,t);
    }
  }
  updateKills(t);
  if(filters.flot) updateFLOT(t);
}

function updateUnit(id,track,t){
  const obj=_merged?.objects[id];if(!obj) return;
  if(!hasCallsign(obj)) return;
  const cat=obj.category;
  const mrk=unitMarkers[id];const poly=unitTrails[id];const lbl=pilotLabels[id];
  if(!mrk) return;
  if(!shouldShow(cat,obj)){
    if(mrk._vis){mrk.setOpacity(0);mrk._vis=false;}
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(poly) poly.setLatLngs([]);
    return;
  }
  const first=track[0].t,last=track[track.length-1].t;
  const alive=t>=first&&t<=last+30;
  if(!alive){
    if(mrk._vis){mrk.setOpacity(0);mrk._vis=false;}
    if(lbl&&lbl._vis){lbl.setOpacity(0);lbl._vis=false;}
    if(poly) poly.setLatLngs([]);
    return;
  }
  // Advance track index
  if(!unitMarkers[id]._idx) unitMarkers[id]._idx=0;
  let idx=unitMarkers[id]._idx;
  if(track[idx]&&track[idx].t>t) idx=0;
  while(idx<track.length-1&&track[idx+1].t<=t) idx++;
  unitMarkers[id]._idx=idx;
  const pt=track[idx];

  mrk.setLatLng([pt.lat,pt.lon]);
  const base=(obj.pilot||'').replace(/\s*\(\d+\)$/,'').trim();
  mrk.setIcon(leafletIcon(cat,obj.name,obj.coalition,pt.hdg,base===selectedPlayer,obj.is_human));
  if(!mrk._vis){mrk.setOpacity(1);mrk._vis=true;}

  // Pilot label
  if(lbl){
    lbl.setLatLng([pt.lat,pt.lon]);
    if(!lbl._vis){lbl.setOpacity(1);lbl._vis=true;}
    const flying=cat==='player_air'||cat==='ai_air';
    const nameEl=document.getElementById(`ln-${id}`);
    const telemEl=document.getElementById(`lt-${id}`);
    if(nameEl){
      // Name: "Joker22 (Mi-8MT)"
      const acType=obj.name||'';
      nameEl.textContent=`${obj.pilot||obj.name}${acType&&flying?' ('+acType+')':''}`;
    }
    if(telemEl&&flying&&pt.alt!=null){
      const altFt=Math.round(pt.alt*3.28084);
      const altK=(altFt/1000).toFixed(1);
      // Speed from position delta
      let machStr='';
      if(idx>0){
        const prev=track[idx-1];const dt=pt.t-prev.t;
        if(dt>0&&dt<20){
          const dlat=(pt.lat-prev.lat)*111320;
          const dlon=(pt.lon-prev.lon)*111320*Math.cos(pt.lat*Math.PI/180);
          const mps=Math.sqrt(dlat*dlat+dlon*dlon)/dt;
          const mach=mps/340;
          if(mach>0.02) machStr=` M${mach.toFixed(2)}`;
        }
      }
      telemEl.textContent=`${altK}k ft${machStr}`;
    } else if(telemEl){telemEl.textContent='';}
  }

  // Fading trail — draw as gradient by splitting into segments with decreasing opacity
  if(filters.trails){
    const pts=track.filter(p=>p.t>=t-TRAIL_SECS&&p.t<=t);
    if(pts.length>=2){
      // Simple fade: just set the line normally; true gradient requires canvas.
      // Use opacity proportional to recency already achieved via the single polyline.
      poly.setLatLngs(pts.map(p=>[p.lat,p.lon]));
    } else {
      poly.setLatLngs([]);
    }
  } else {
    poly.setLatLngs([]);
  }
}

function shouldShow(cat,obj){
  if(cat==='player_air') return filters.playerAir;
  if(cat==='ai_air') return filters.aiAir;
  if(cat==='ground') return filters.ground;
  return false;
}

// ════════════════════════════════════════════════════════════════════
//  EXPLOSION ANIMATIONS
// ════════════════════════════════════════════════════════════════════
function spawnExp(lat,lon,isPlayer){
  const sz=isPlayer?58:34,dur=isPlayer?1800:1200;
  const fc=isPlayer?'#ff4422':'#ffaa22';
  const ring=isPlayer?'#ff8844':'#ffcc44';
  const smoke=isPlayer?'#886655':'#998866';
  const h=sz/2;
  const sparks=[0,45,90,135,180,225,270,315].map(a=>{
    const r=h*.55,r2=h*.82;
    const x1=(Math.cos(a*Math.PI/180)*r).toFixed(1),y1=(Math.sin(a*Math.PI/180)*r).toFixed(1);
    const x2=(Math.cos(a*Math.PI/180)*r2).toFixed(1),y2=(Math.sin(a*Math.PI/180)*r2).toFixed(1);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${ring}" stroke-width="${isPlayer?2.5:1.5}" stroke-linecap="round"/>`;
  }).join('');
  const html=`<div style="position:relative;width:${sz}px;height:${sz}px;pointer-events:none">
    <div style="position:absolute;left:50%;top:50%;width:${sz*.9}px;height:${sz*.9}px;border-radius:50%;border:${isPlayer?4:3}px solid ${smoke};animation:er2 ${dur}ms ease-out forwards"></div>
    <div style="position:absolute;left:50%;top:50%;width:${sz*.75}px;height:${sz*.75}px;border-radius:50%;border:${isPlayer?5:3}px solid ${ring};background:radial-gradient(circle,${fc}cc 0%,${fc}55 50%,transparent 75%);animation:er1 ${dur*.8}ms ease-out forwards"></div>
    <div style="position:absolute;left:50%;top:50%;width:${sz*.4}px;height:${sz*.4}px;border-radius:50%;background:radial-gradient(circle,#ffffcc 0%,#ffdd44 40%,${fc} 80%);animation:ec ${dur*.7}ms ease-out forwards;box-shadow:0 0 ${isPlayer?18:10}px #ffaa33"></div>
    <svg style="position:absolute;left:50%;top:50%;overflow:visible;animation:esk ${dur*.9}ms ease-out forwards" width="${sz}" height="${sz}" viewBox="-${h} -${h} ${sz} ${sz}">${sparks}</svg>
  </div>`;
  const icon=L.divIcon({html,className:'expmark',iconSize:[sz,sz],iconAnchor:[h,h]});
  const m=L.marker([lat,lon],{icon,zIndexOffset:5000,interactive:false}).addTo(map);
  killLayers.push(m);
  setTimeout(()=>{try{map.removeLayer(m)}catch(e){}},dur+100);
}

function updateKills(t){
  if(!filters.kills) return;
  for(const ev of SESSIONS.flatMap(s=>s.events)){
    if(ev.type!=='kill'&&ev.type!=='crashed') continue;
    if(!ev.lat||!ev.lon) continue;
    const age=t-ev.t;
    if(age<0||age>25) continue;
    const key=`${ev.t}_${ev.victim_id}`;
    if(shownKills.has(key)) continue;
    shownKills.add(key);
    const isPlayer=ev.victim_category==='player_air'&&ev.victim_pilot;
    spawnExp(ev.lat,ev.lon,isPlayer);
    const color=isPlayer?'#f85149':'#d29922';
    const dot=L.circleMarker([ev.lat,ev.lon],{radius:3,color,fillColor:color,fillOpacity:.8,weight:1}).addTo(map);
    const tip=isPlayer
      ?`💥 <b>${ev.victim_pilot}</b> (${ev.victim_name})<br>by ${ev.killer||'?'} · ${ev.weapon||'?'}`
      :`💥 ${ev.victim_name}`;
    dot.bindTooltip(tip,{sticky:true});
    killLayers.push(dot);
    const fade=Math.max(5000,25000/Math.max(playSpeed,1));
    setTimeout(()=>{try{map.removeLayer(dot)}catch(e){}; shownKills.delete(key);},fade);
  }
}

// ════════════════════════════════════════════════════════════════════
//  FLOT — Forward Line of Troops
//
//  Design:
//  - Only ground units contribute (never aircraft)
//  - Bases have strong positional weight (as if 8 virtual ground units)
//  - Unit clusters vote for their coalition's territory
//  - FLOT line is drawn as a spline OUTSIDE base circles:
//    segments that pass through an owned-by-same-coalition base circle
//    are suppressed (the base 'swallows' the line)
//  - Recomputed every FLOT_INT seconds of gametime
// ════════════════════════════════════════════════════════════════════
const FLOT_INT=20;
const BASE_WEIGHT=8;  // each base counts as this many ground units for FLOT
const NM10_DEG=0.167; // ~10nm in lat degrees at 51°N

function updateFLOT(t){
  if(Math.abs(t-flotLastT)<FLOT_INT) return;
  flotLastT=t;
  const blue=[],red=[];

  // Ground units currently alive
  for(const s of SESSIONS){
    for(const [id,track] of Object.entries(s.tracks)){
      const obj=_merged?.objects[id];
      if(!obj||obj.category!=='ground') continue;
      if(track[0].t>t||track[track.length-1].t<t-60) continue;
      const idx=unitMarkers[id]?._idx||0;
      const pt=track[Math.min(idx,track.length-1)];
      if(!pt) continue;
      if(obj.coalition==='Friendlies') blue.push([pt.lat,pt.lon]);
      else if(obj.coalition==='Hostiles') red.push([pt.lat,pt.lon]);
    }
  }

  // Bases contribute weighted points
  for(const b of _baseList){
    const isBlue=b.coalition==='Friendlies';
    const isRed=b.coalition==='Hostiles';
    for(let i=0;i<BASE_WEIGHT;i++){
      // Spread the virtual points in a small cluster around the base
      const da=(Math.random()-.5)*0.04,do2=(Math.random()-.5)*0.04;
      if(isBlue) blue.push([b.lat+da,b.lon+do2]);
      else if(isRed) red.push([b.lat+da,b.lon+do2]);
    }
  }

  if(blue.length<4||red.length<4){clearFLOT();return;}

  clearFLOT();

  const blueHull=convexHull(blue);
  const redHull=convexHull(red);
  if(!blueHull.length||!redHull.length) return;

  const flotPane=map.getPane('flotPane');

  // Draw filled territory hulls
  flotBlueFill=L.polygon(blueHull,{
    pane:'flotPane',color:'#3399ff',weight:0,fillColor:'#3399ff',fillOpacity:.08,interactive:false
  }).addTo(map);
  flotRedFill=L.polygon(redHull,{
    pane:'flotPane',color:'#ff4433',weight:0,fillColor:'#ff4433',fillOpacity:.08,interactive:false
  }).addTo(map);

  // Compute frontier: hull edges of each side that face the enemy
  const blueFront=frontierEdge(blueHull,red);
  const redFront=frontierEdge(redHull,blue);

  // Suppress segments that pass through same-coalition base circles
  const blueFiltered=filterThroughBases(blueFront,'Friendlies');
  const redFiltered=filterThroughBases(redFront,'Hostiles');

  if(blueFiltered.length>=2){
    flotBlueLine=L.polyline(blueFiltered,{pane:'flotPane',color:'#4499ff',weight:3,opacity:.75,interactive:false}).addTo(map);
  }
  if(redFiltered.length>=2){
    flotRedLine=L.polyline(redFiltered,{pane:'flotPane',color:'#ff4433',weight:3,opacity:.75,interactive:false}).addTo(map);
  }
}

// Remove FLOT line segments that fall inside same-coalition base circles
function filterThroughBases(pts,coalition){
  if(!pts.length) return pts;
  // For each point, check if it's inside a same-coalition base circle
  // If so, suppress it — this creates a gap where the base circle "swallows" the line
  return pts.filter(p=>{
    for(const b of _baseList){
      const sameCoal=(coalition==='Friendlies'&&(b.coalition==='Friendlies'||b.coalition==='Blue'))||
                     (coalition==='Hostiles'&&(b.coalition==='Hostiles'||b.coalition==='Red'));
      if(!sameCoal) continue;
      const dlat=(p[0]-b.lat)*111320;
      const dlon=(p[1]-b.lon)*111320*Math.cos(b.lat*Math.PI/180);
      if(Math.sqrt(dlat*dlat+dlon*dlon)<18520) return false; // inside circle
    }
    return true;
  });
}

// Convex hull — Andrew's monotone chain
function convexHull(pts){
  if(pts.length<3) return pts.slice();
  const s=pts.slice().sort((a,b)=>a[1]!==b[1]?a[1]-b[1]:a[0]-b[0]);
  const cross=(o,a,b)=>(a[1]-o[1])*(b[0]-o[0])-(a[0]-o[0])*(b[1]-o[1]);
  const lo=[],hi=[];
  for(const p of s){while(lo.length>=2&&cross(lo[lo.length-2],lo[lo.length-1],p)<=0)lo.pop();lo.push(p);}
  for(let i=s.length-1;i>=0;i--){const p=s[i];while(hi.length>=2&&cross(hi[hi.length-2],hi[hi.length-1],p)<=0)hi.pop();hi.push(p);}
  hi.pop();lo.pop();
  return lo.concat(hi);
}

// Extract hull vertices that form the facing edge toward enemy
function frontierEdge(hull,enemy){
  if(!hull.length||!enemy.length) return [];
  const ec=enemy.reduce((a,p)=>[a[0]+p[0],a[1]+p[1]],[0,0]);
  const eCen=[ec[0]/enemy.length,ec[1]/enemy.length];
  const oc=hull.reduce((a,p)=>[a[0]+p[0],a[1]+p[1]],[0,0]);
  const oCen=[oc[0]/hull.length,oc[1]/hull.length];
  const dx=eCen[1]-oCen[1],dy=eCen[0]-oCen[0];
  let front=hull.filter(p=>{
    const px=p[1]-oCen[1],py=p[0]-oCen[0];
    return(px*dx+py*dy)>0;
  });
  if(front.length<2) front=hull.slice();
  front.sort((a,b)=>{
    const aa=Math.atan2(a[0]-oCen[0],a[1]-oCen[1]);
    const ba=Math.atan2(b[0]-oCen[0],b[1]-oCen[1]);
    return aa-ba;
  });
  return front;
}

function clearFLOT(){
  for(const l of [flotBlueFill,flotBlueLine,flotRedFill,flotRedLine])
    if(l){try{map.removeLayer(l)}catch(e){}}
  flotBlueFill=flotBlueLine=flotRedFill=flotRedLine=null;
  flotLastT=-9999;
}

// ════════════════════════════════════════════════════════════════════
//  PLAYBACK
// ════════════════════════════════════════════════════════════════════
function tick(raf){
  if(!playing) return;
  if(lastRaf!==null){
    const dt=(raf-lastRaf)/1000;
    currentTime=Math.min(currentTime+dt*playSpeed,campaignDur);
    if(currentTime>=campaignDur){currentTime=campaignDur;playing=false;updPlayBtn();}
    updateDisplay();
  }
  lastRaf=raf;
  if(playing) rafId=requestAnimationFrame(tick);
}
function startPlay(){if(currentTime>=campaignDur)currentTime=0;playing=true;lastRaf=null;updPlayBtn();rafId=requestAnimationFrame(tick);}
function pausePlay(){playing=false;lastRaf=null;updPlayBtn();if(rafId)cancelAnimationFrame(rafId);}
function updPlayBtn(){document.getElementById('btn-play').classList.toggle('active',playing);}
function seekTo(t){currentTime=Math.max(0,Math.min(t,campaignDur));flotLastT=-9999;shownKills.clear();updateDisplay();}

// ════════════════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click',()=>{if(!playing)startPlay();});
document.getElementById('btn-pause').addEventListener('click',pausePlay);
document.getElementById('btn-prev').addEventListener('click',()=>{pausePlay();seekTo(0);});
document.getElementById('btn-next').addEventListener('click',()=>{pausePlay();seekTo(campaignDur);});
document.getElementById('scrubber').addEventListener('input',e=>{pausePlay();seekTo(parseFloat(e.target.value));});

// Speed buttons
document.querySelectorAll('.spdbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.spdbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    playSpeed=parseInt(btn.dataset.spd);
  });
});

// Filters
document.getElementById('f-player').addEventListener('change',e=>{filters.playerAir=e.target.checked;updateDisplay();});
document.getElementById('f-ai').addEventListener('change',e=>{filters.aiAir=e.target.checked;updateDisplay();});
document.getElementById('f-ground').addEventListener('change',e=>{filters.ground=e.target.checked;updateDisplay();});
document.getElementById('f-trails').addEventListener('change',e=>{filters.trails=e.target.checked;updateDisplay();});
document.getElementById('f-kills').addEventListener('change',e=>{filters.kills=e.target.checked;});
document.getElementById('f-bases').addEventListener('change',e=>{
  filters.bases=e.target.checked;
  for(const m of Object.values(baseMarkers)) filters.bases?m.addTo(map):map.removeLayer(m);
  for(const c of Object.values(baseCircles)) filters.bases?c.addTo(map):map.removeLayer(c);
});
document.getElementById('f-flot').addEventListener('change',e=>{
  filters.flot=e.target.checked;
  if(!filters.flot){clearFLOT();}else{flotLastT=-9999;updateFLOT(currentTime);}
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.code==='Space'){e.preventDefault();playing?pausePlay():startPlay();}
  if(e.code==='ArrowRight') seekTo(currentTime+60);
  if(e.code==='ArrowLeft')  seekTo(currentTime-60);
  if(e.code==='ArrowUp')    seekTo(currentTime+300);
  if(e.code==='ArrowDown')  seekTo(currentTime-300);
});

// ════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════
function fmtT(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);return`${h}:${pad(m)}:${pad(sc)}`;}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${pad(m)}m`:`${m}m`;}
function pad(n){return String(n).padStart(2,'0');}
function setLoad(msg){document.getElementById('load-msg').textContent=msg;}

// ════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════
populateSelector();
loadCampaign(Object.keys(CAMPAIGNS)[0]).catch(err=>{
  setLoad('Error: '+err.message);console.error(err);
});
